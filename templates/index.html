<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flugzeug Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #090d1a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #0d1528;
            border-bottom: 1px solid #1e3a5f;
            padding: 13px 28px;
            display: flex;
            align-items: center;
            position: sticky; top: 0; z-index: 10;
        }

        .logo { font-size: 18px; font-weight: 800; color: #00d4aa; flex: 1; }

        .hdr-center {
            display: flex; align-items: baseline; gap: 8px;
            flex-shrink: 0;
        }
        .hdr-count { font-size: 24px; font-weight: 800; color: #00d4aa; line-height: 1; }
        .hdr-count-rwy18 { color: #a855f7; }
        .hdr-count-lbl { font-size: 12px; color: #475569; white-space: nowrap; }
        .hdr-sep { font-size: 18px; color: #1e3a5f; font-weight: 300; }

        .controls { display: flex; align-items: center; gap: 16px; flex: 1; justify-content: flex-end; }
        .meta { font-size: 13px; color: #475569; }
        .meta b { color: #00d4aa; display: inline-block; min-width: 2ch; text-align: right; }

        select {
            background: #1e293b; border: 1px solid #334155;
            color: #e2e8f0; padding: 7px 12px;
            border-radius: 8px; font-size: 13px; cursor: pointer;
        }

        .pulse {
            width: 9px; height: 9px; border-radius: 50%;
            background: #00d4aa; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

        main { padding: 10px 16px 16px; }

        .status-bar {
            display: flex; align-items: baseline;
            gap: 12px; margin-bottom: 18px;
        }
        .flight-count { font-size: 14px; color: #64748b; }
        .flight-count b { font-size: 28px; color: #00d4aa; font-weight: 800; }
        .source-tag {
            font-size: 11px; font-weight: 700;
            padding: 2px 8px; border-radius: 8px;
            color: #f97316; border: 1px solid #f9731650;
            background: #f9731610;
        }

        /* ── Card ── */
        .card {
            background: #0d1528;
            border: 1px solid #1e3a5f;
            border-radius: 14px;
            margin-bottom: 14px;
            display: flex;
            align-items: stretch;
            overflow: hidden;
            transition: border-color .2s;
            position: relative;
        }
        .card:hover { border-color: #00d4aa44; }
        .card.new-flight {
            border-color: #00d4aa;
            animation: flashIn .8s ease;
        }
        @keyframes flashIn { 0%{background:#00d4aa18} 100%{background:#0d1528} }

        .card.compact {
            opacity: .7;
            margin-bottom: 6px;
        }
        .card.compact:hover { opacity: 1; }
        .compact-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            width: 100%;
        }
        .compact-callsign {
            font-family: monospace;
            font-size: 13px;
            font-weight: 700;
            color: #94a3b8;
            min-width: 80px;
        }
        .compact-type {
            font-size: 11px;
            color: #64748b;
            flex: 1;
        }
        .compact-stats {
            display: flex;
            gap: 14px;
            font-size: 11px;
            color: #64748b;
        }
        .compact-stats span { white-space: nowrap; }

        .card.military {
            border-color: #1e3a6e;
            border-width: 2px;
            background: #080d1a;
        }
        .card.military:hover { border-color: #3b82f6; }
        .card.military.new-flight { border-color: #93c5fd; animation: flashInMil .8s ease; }
        @keyframes flashInMil { 0%{background:#1e3a6e22} 100%{background:#080d1a} }
        .military-badge {
            background: #1e3a8a;
            color: #93c5fd;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .08em;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .card.military .side-bar { background: #1e3a6e; }

        .card.overhead {
            border-color: #f97316;
            border-width: 2px;
            background: #1a0e06;
            box-shadow: 0 0 32px #f9731630, 0 0 0 1px #f9731644;
            animation: overheadPulse 1.5s ease-in-out infinite;
        }
        @keyframes overheadPulse {
            0%,100% { box-shadow: 0 0 32px #f9731630, 0 0 0 1px #f9731444; }
            50%      { box-shadow: 0 0 52px #f9731660, 0 0 0 2px #f97316aa; }
        }

        .overhead-tag {
            position: absolute; top: 14px; right: 14px;
            background: #f97316; color: #fff;
            font-size: 11px; font-weight: 800;
            padding: 4px 10px; border-radius: 6px;
            letter-spacing: .04em;
            animation: overheadPulse 1.5s ease-in-out infinite;
            z-index: 2;
        }

        .new-tag {
            position: absolute; top: 14px; right: 14px;
            background: #ef4444; color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 5px;
            z-index: 2;
        }

        .speak-btn {
            background: #1e293b; border: 1px solid #334155;
            color: #64748b; font-size: 16px;
            width: 36px; height: 36px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all .15s;
            margin-top: 8px; width: 100%;
        }
        .speak-btn:hover { background: #00d4aa22; border-color: #00d4aa; color: #00d4aa; }
        .speak-btn.speaking { background: #00d4aa22; border-color: #00d4aa; color: #00d4aa;
            animation: pulse 1s infinite; }

        /* Card sections */
        .sec {
            padding: 20px 24px;
            border-right: 1px solid #1a2f4a;
        }
        .sec:last-child { border-right: none; }

        .sec-label {
            font-size: 9px; text-transform: uppercase;
            letter-spacing: .1em; color: #334155;
            margin-bottom: 12px; font-weight: 600;
        }

        /* Section 1: Identity */
        .sec-identity {
            width: 220px;
            flex-shrink: 0;
        }

        .callsign {
            font-size: 38px; font-weight: 800;
            color: #00d4aa; font-family: 'Courier New', monospace;
            letter-spacing: .03em; line-height: 1;
            margin-bottom: 4px;
        }

        .flight-num {
            font-size: 14px; color: #64748b;
            font-family: 'Courier New', monospace;
            margin-bottom: 14px;
        }

        .id-row {
            display: flex; flex-direction: column; gap: 6px;
        }

        .id-item-label {
            font-size: 9px; text-transform: uppercase;
            letter-spacing: .08em; color: #334155; margin-bottom: 1px;
        }

        .id-item-value {
            font-size: 14px; font-weight: 600; color: #94a3b8;
        }

        .id-item-value.loading {
            color: #334155; font-style: italic; font-size: 12px;
        }

        /* Section 2: Route */
        .sec-route {
            flex: 1;
            min-width: 0;
        }

        .route-wrap {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .airport {
            flex: 1; min-width: 0;
        }

        .airport.right { text-align: right; }

        .ap-iata {
            font-size: 48px; font-weight: 900;
            color: #e2e8f0; letter-spacing: .04em; line-height: 1;
        }

        .ap-name {
            font-size: 15px; font-weight: 600;
            color: #94a3b8; margin-top: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .ap-city {
            font-size: 12px; color: #475569; margin-top: 2px;
        }

        .ap-time {
            font-size: 18px; font-weight: 700;
            color: #00d4aa; margin-top: 8px;
            font-family: 'Courier New', monospace;
        }

        .ap-time-label {
            font-size: 10px; color: #334155; margin-top: 1px;
        }

        .route-mid {
            flex-shrink: 0;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .route-plane {
            font-size: 28px;
            color: #1e3a5f;
        }

        .status-pill {
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
            white-space: nowrap;
        }

        /* Section 3: Live stats */
        .sec-live {
            width: 260px;
            flex-shrink: 0;
        }

        .live-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 18px;
        }

        .live-label {
            font-size: 9px; text-transform: uppercase;
            letter-spacing: .08em; color: #334155; margin-bottom: 3px;
        }

        .live-value {
            font-size: 22px; font-weight: 700;
            color: #e2e8f0; line-height: 1;
        }

        .live-unit { font-size: 11px; color: #475569; font-weight: 400; }
        .live-sub  { font-size: 11px; color: #475569; margin-top: 2px; }

        .vs-up   { color: #22c55e; }
        .vs-down { color: #f87171; }
        .vs-level{ color: #475569; }

        /* Section 4: Radar */
        .sec-radar {
            width: 150px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: #090d1a;
        }

        .radar-svg-wrap {
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            overflow: hidden;
            background: #060911;
            width: 118px; height: 118px;
        }

        .approach-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700;
            padding: 5px 10px; border-radius: 7px;
            text-align: center; width: 100%;
            justify-content: center;
        }

        .ap-dot {
            width: 6px; height: 6px;
            border-radius: 50%; flex-shrink: 0;
        }

        /* Empty / loading states */
        .state-msg {
            text-align: center; padding: 80px 20px; color: #334155;
        }
        .state-msg .icon { font-size: 56px; margin-bottom: 14px; }
        .state-msg .text { font-size: 20px; font-weight: 600; }
        .state-msg .hint { font-size: 14px; margin-top: 8px; color: #1e3a5f; }

        /* ── Balcony Radar ── */
        .main-layout { display: flex; gap: 16px; align-items: flex-start; }
        .main-flight-col { flex: 1; min-width: 0; }
        .balcony-radar-panel {
            flex-shrink: 0; width: 240px;
            background: #0d1528; border: 1px solid #1e3a5f;
            border-radius: 14px; padding: 12px 10px 10px;
            position: sticky; top: 74px;
        }
        .balcony-radar-title {
            font-size: 10px; font-weight: 700; letter-spacing: .08em;
            text-transform: uppercase; color: #475569;
            text-align: center; margin-bottom: 8px;
        }
        #balconyRadarSvg { display: block; margin: 0 auto; overflow: visible; }
        body.light .balcony-radar-panel { background: #f8fafc; border-color: #cbd5e1; }
        body.light .balcony-radar-title { color: #94a3b8; }

        /* Map */
        #mapWrap { height: 360px; border-bottom: 1px solid #1e3a5f; display: none; position: relative; }
        #mapResetBtn { display:none; position:absolute; top:10px; right:10px; z-index:1000; align-items:center; gap:6px; background:#1e293b; color:#00d4aa; border:1.5px solid #00d4aa44; border-radius:8px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; box-shadow:0 2px 8px #0005; }
        #mapResetBtn:hover { background:#00d4aa; color:#0f172a; }
        body.light #mapResetBtn { background:#fff; color:#0ea5e9; border-color:#0ea5e944; }
        body.light #mapResetBtn:hover { background:#0ea5e9; color:#fff; }
        #mapFraBtn, #mapHomeBtn { display:flex; position:absolute; bottom:10px; z-index:1000; align-items:center; gap:5px; background:#1e293b; color:#94a3b8; border:1px solid #334155; border-radius:8px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; box-shadow:0 2px 8px #0005; }
        #mapFraBtn { left:10px; }
        #mapHomeBtn { left:90px; }
        #mapFraBtn:hover, #mapHomeBtn:hover { border-color:#00d4aa; color:#00d4aa; }
        body.light #mapFraBtn, body.light #mapHomeBtn { background:#fff; color:#374151; border-color:#cbd5e1; }
        body.light #mapFraBtn:hover, body.light #mapHomeBtn:hover { border-color:#0284c7; color:#0284c7; }
        #map { height: 100%; }
        .flight-marker { font-size: 18px; line-height: 1; filter: drop-shadow(0 0 3px #000c); cursor: pointer; }
        .leaflet-popup-content-wrapper { background: #0d1528; border: 1px solid #1e3a5f; color: #e2e8f0; border-radius: 10px; }
        .leaflet-popup-tip { background: #0d1528; }
        .map-btn { background:#1e293b; border:1px solid #334155; color:#94a3b8; padding:7px 14px; border-radius:8px; font-size:13px; cursor:pointer; transition:all .15s; }
        .map-btn:hover, .map-btn.active { border-color:#00d4aa; color:#00d4aa; }
        .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#00d4aa; margin-right:4px; animation: livePulse 1.2s ease-in-out infinite; }
        @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

        /* FR24 link */
        .fr24-btn { background:none; border:none; color:#475569; font-size:12px; cursor:pointer; padding:4px 6px; border-radius:6px; transition:all .15s; text-decoration:none; display:inline-flex; align-items:center; gap:3px; }
        .fr24-btn:hover { color:#00d4aa; background:#00d4aa11; }

        /* ── Light Theme ── */
        body.light { background:#f0f4f8; color:#0f172a; }
        body.light header { background:#fff; border-bottom-color:#cbd5e1; }
        body.light .logo { color:#0284c7; }
        body.light .hdr-count { color:#0284c7; }
        body.light .hdr-count-lbl { color:#94a3b8; }
        body.light select { background:#fff; border-color:#cbd5e1; color:#0f172a; }
        body.light .map-btn { background:#f1f5f9; border-color:#cbd5e1; color:#374151; }
        body.light .map-btn:hover, body.light .map-btn.active { border-color:#0284c7; color:#0284c7; }
        body.light .meta { color:#64748b; }
        body.light .meta b { color:#0284c7; }
        body.light .flight-count { color:#374151; }
        body.light .flight-count b { color:#0284c7; }
        body.light .card { background:#fff; border-color:#cbd5e1; }
        body.light .card:hover { border-color:#0284c744; }
        body.light .card.new-flight { border-color:#0284c7; animation:flashInLight .8s ease; }
        @keyframes flashInLight { 0%{background:#0284c718} 100%{background:#fff} }
        body.light .card.military { background:#eff6ff; border-color:#1e3a6e; }
        body.light .card.military:hover { border-color:#3b82f6; }
        body.light .card.military.new-flight { animation:flashInMil .8s ease; }
        body.light .card.overhead { background:#fff7ed; }
        body.light .sec { border-right-color:#e2e8f0; }
        body.light .sec-label { color:#94a3b8; }
        body.light .callsign { color:#0284c7; }
        body.light .flight-num { color:#94a3b8; }
        body.light .id-item-label { color:#94a3b8; }
        body.light .id-item-value { color:#1e293b; }
        body.light .ap-iata { color:#0f172a; }
        body.light .ap-name { color:#334155; }
        body.light .ap-city { color:#64748b; }
        body.light .ap-time { color:#0284c7; }
        body.light .ap-time-label { color:#94a3b8; }
        body.light .route-plane { color:#cbd5e1; }
        body.light .live-label { color:#94a3b8; }
        body.light .live-value { color:#0f172a; }
        body.light .live-unit, body.light .live-sub { color:#64748b; }
        body.light .compact-callsign { color:#334155; }
        body.light .compact-type, body.light .compact-stats { color:#94a3b8; }
        body.light .sec-radar { background:#f1f5f9; }
        body.light .radar-svg-wrap { background:#e2e8f0; border-color:#cbd5e1; }
        body.light .speak-btn { background:#f1f5f9; border-color:#cbd5e1; color:#94a3b8; }
        body.light .speak-btn:hover { background:#0284c711; border-color:#0284c7; color:#0284c7; }
        body.light .state-msg { color:#94a3b8; }
        body.light .state-msg .hint { color:#cbd5e1; }
        body.light #mapWrap { border-bottom-color:#cbd5e1; }
        body.light .leaflet-popup-content-wrapper { background:#fff; border-color:#cbd5e1; color:#0f172a; }
        body.light .leaflet-popup-tip { background:#fff; }
        body.light .fr24-btn { color:#94a3b8; }
        body.light .fr24-btn:hover { color:#0284c7; background:#0284c711; }

        /* ── Big Card (top 2 closest flights) ── */
        #mapSelectedCard { padding: 0; }
        #mapSelectedCard .bigcard { border-color: #00d4aa66; box-shadow: 0 0 0 1px #00d4aa22; margin-bottom: 0; }
        body.light #mapSelectedCard .bigcard { border-color: #0ea5e966; }
        .bigcard {
            background: #0d1528;
            border: 1px solid #1e3a5f;
            border-radius: 16px;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: border-color .2s;
        }
        .bigcard.new-flight { border-color: #00d4aa; animation: flashIn .8s ease; }
        .bigcard.overhead {
            border-color: #f97316; border-width: 2px;
            background: #120d06;
            box-shadow: 0 0 40px #f9731630, 0 0 0 1px #f9731444;
            animation: overheadPulse 1.5s ease-in-out infinite;
        }
        .bigcard.military { border-color: #1e3a6e; background: #080d1a; border-width: 2px; }

        /* Row 1: Header — callsign + distance */
        .bc-header {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 10px 18px 8px;
            border-bottom: 1px solid #1a2f4a;
            flex-shrink: 0; gap: 10px;
        }
        .bc-id-block { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0; }
        .bc-logo-wrap {
            background: #fff; border-radius: 6px; padding: 3px 8px;
            display: inline-flex; align-items: center; flex-shrink: 0;
        }
        .bc-callsign {
            font-size: 42px; font-weight: 800; color: #00d4aa;
            font-family: 'Courier New', monospace; letter-spacing: .03em; line-height: 1;
        }
        .bc-airline { font-size: 15px; color: #64748b; font-weight: 500; white-space: nowrap; }
        .bc-dist-block { text-align: right; flex-shrink: 0; }
        .bc-dist-num {
            font-size: 36px; font-weight: 800; color: #e2e8f0;
            line-height: 1; font-family: 'Courier New', monospace;
        }
        .bc-dist-unit { font-size: 14px; color: #475569; margin-left: 3px; }

        /* ── Odometer rolling digit animation ── */
        .od-wrap { display: inline-flex; align-items: flex-end; vertical-align: bottom; }
        .od-col  { display: inline-block; overflow: hidden; height: 1em; width: 1ch; line-height: 1; }
        .od-strip {
            display: flex; flex-direction: column;
            will-change: transform;
            transition: transform 120ms cubic-bezier(.22,.61,.36,1);
        }
        .od-strip span { display: block; height: 1em; line-height: 1; text-align: center; }
        .od-dot { display: inline-block; height: 1em; line-height: 1; }
        .bc-approach {
            font-size: 12px; font-weight: 700;
            padding: 4px 10px; border-radius: 8px;
            margin-top: 5px; display: inline-block; white-space: nowrap;
        }

        /* Row 2: Aircraft model + reg + buttons */
        .bc-aircraft-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 18px;
            background: #070c18;
            border-bottom: 1px solid #1a2f4a;
            flex-shrink: 0; gap: 8px; flex-wrap: wrap;
        }
        .bc-aircraft-model {
            font-size: 28px; font-weight: 700; color: #f0f6ff;
            letter-spacing: .02em; line-height: 1.2;
        }
        .bc-aircraft-variant {
            font-size: 11px; color: #475569; margin-top: 2px;
            font-family: monospace; letter-spacing: .03em;
        }
        .bc-aircraft-meta {
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .bc-reg { font-size: 13px; color: #334155; font-family: monospace; }
        .bc-speakfr24 { display: flex; align-items: center; gap: 8px; }

        /* Row 3: Route with radar */
        .bc-route-row {
            display: flex; align-items: center;
            padding: 10px 18px; flex-shrink: 0; gap: 0;
            border-bottom: 1px solid #1a2f4a;
        }
        .bc-ap-block { flex: 1; min-width: 0; }
        .bc-ap-block.right { text-align: right; }
        .bc-iata {
            font-size: 52px; font-weight: 900; color: #e2e8f0;
            letter-spacing: .04em; line-height: 1;
        }
        .bc-city {
            font-size: 13px; color: #64748b; margin-top: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .bc-route-mid {
            flex-shrink: 0; padding: 0 16px;
            display: flex; align-items: center; justify-content: center;
        }
        .bc-radar-wrap {
            width: 110px; height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid #1e3a5f;
            background: #060911;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        body.light .bc-radar-wrap { background: #e2e8f0; border-color: #cbd5e1; }

        /* Row 4: Stats */
        .bc-stats-row {
            display: flex; align-items: stretch;
            border-bottom: 1px solid #1a2f4a; flex-shrink: 0;
        }
        .bc-stat-item {
            flex: 1; padding: 7px 10px;
            border-right: 1px solid #1a2f4a;

<script>
// Patch L.Marker to use sub-pixel CSS transforms.
// Leaflet's default update() calls latLngToLayerPoint().round() which forces
// integer pixel positions — causing visible oscillation at 60fps with tiny moves.
L.Marker.include({
    update: function () {
        if (this._icon && this._map) {
            var pos = this._map.project(this._latlng)
                          ._subtract(this._map.getPixelOrigin());
            this._setPos(pos);  // no .round() — sub-pixel accurate
        }
        return this;
    }
});
</script>

function airlineName(iata, icao) {
    if (!iata && !icao) return '';
    const name = AIRLINES[iata] || AIRLINES[icao];
    if (name) return name;
    // Show raw code only if we have no name, so at least something is displayed
    const code = iata || icao || '';
    return code ? `${code} (unbekannt)` : '';
}

function aircraftName(code) {
    if (!code) return '';
    return AIRCRAFT[code] || code;
}

/* ── Triebwerk-Hersteller ── */
function _engMfr(s) {
    if (/CFM56|LEAP-1/.test(s))                       return 'CFM International';
    if (/V25\d{2}/.test(s))                            return 'IAE';
    if (/GE90|GEnx|GE9X|\bCF6\b|CF34/.test(s))       return 'GE Aviation';
    if (/Trent|RB211|\bTay\b|AE3007/.test(s))         return 'Rolls-Royce';
    if (/BR715/.test(s))                               return 'BMW/Rolls-Royce';
    if (/GP7\d/.test(s))                               return 'Engine Alliance';
    if (/JT[89]D|PW[2469]\d{3}|PW6\d{3}/.test(s))    return 'Pratt & Whitney';
    if (/PW1[1-9]\d{2}G/.test(s))                     return 'Pratt & Whitney';
    if (/PW1[0-9]\d[A-Z]|PW12\d|PW15\d|PT6/.test(s)) return 'P&W Canada';
    if (/PS-90|D-30KU|D-30KP|NK-8/.test(s))           return 'Aviadvigatel';
    if (/SaM146/.test(s))                              return 'PowerJet';
    if (/TP400/.test(s))                               return 'Europrop Intl.';
    if (/Olympus/.test(s))                             return 'Rolls-Royce/SNECMA';
    return '';
}

function _engChips(engStr) {
    if (!engStr) return '';
    // e.g. "2× CFM56-5B / V2500" → split on " / "
    const countM = engStr.match(/^(\d+×\s*)/);
    const count = countM ? countM[1] : '';
    const rest = engStr.replace(/^\d+×\s*/, '');
    return rest.split(/\s*\/\s*/).map((alt, i) => {
        const mfr = _engMfr(alt);
        const label = (i === 0 ? count : '') + alt;
        return `<span class="bc-spec-chip eng-chip">⚙ <b>${label}</b>${mfr ? `<span class="bc-eng-mfr"> · ${mfr}</span>` : ''}</span>`;
    }).join('');
}

    SL:'Sharklet Winglets (≈3 % Kraftstoffersparnis)',
    W:'Winglets', ACJ:'Airbus Corporate Jet',
    LR:'Long Range', XLR:'Extra Long Range',
    ER:'Extended Range', F:'Frachter',
    P2F:'Passenger-to-Freighter (Umbau)',
    HGW:'High Gross Weight (erhöhtes MTOW)',
};

// Returns { notes: string[], engine: string|null }
// engine is the specific fitted engine (overrides generic AC_SPECS alternatives)
function decodeVariant(code, typeFull) {
    if (!typeFull || !code) return { notes: [], engine: null, prod: null };
    const notes = [];
    let specificEngine = null;
    let varProd = null;
    const c = code.toUpperCase();

    // Extract variant part after "-": "A320-214SL" → "214SL"
    const m = typeFull.match(/[-\s](\d{1,4}[A-Z/]*)(?:\s|$)/);
    if (!m) return { notes: [], engine: null, prod: null };
    const v = m[1];

    // Airbus A320-family: 3-digit code + suffix  e.g. 214SL, 271NX
    if (/^A3(18|19|20|21)$/.test(c)) {
        const am = v.match(/^(\d)(\d{2})(N?)([A-Z]*)$/i);
        if (am) {
            const [, series, eng2, neo, suffix] = am;
            notes.push(`Serie ${series}00`);
            const key = `${c}-${eng2}`;
            const dbEng = _AB_ENG[key];
            if (dbEng) {
                specificEngine = dbEng;
            } else if (neo) {
                specificEngine = (eng2 >= '51' && eng2 <= '59') ? 'CFM LEAP-1A' : 'PW1100G GTF';
            }
            varProd = _AB_PROD[key] || null;
            // Decode suffix chars (skip 'N' — already handled as neo flag)
            let rem = suffix.toUpperCase();
            ['XLR','P2F','HGW','ACJ','SL','LR','ER','F','W'].forEach(s => {
                if (rem.includes(s)) { rem = rem.replace(s, ''); if (_SUFFIX_DECODE[s]) notes.push(_SUFFIX_DECODE[s]); }
            });
        }
    } else {
        // Generic: just decode suffix letters
        const letters = v.replace(/\d+/g, '').toUpperCase();
        ['XLR','P2F','HGW','ACJ','SL','LR','ER','F','W'].forEach(s => {
            if (letters.includes(s) && _SUFFIX_DECODE[s]) notes.push(_SUFFIX_DECODE[s]);
        });
    }
    return { notes, engine: specificEngine, prod: varProd };
}

const _TTS_D = ['null','eins','zwei','drei','vier','fünf','sechs','sieben','acht','neun'];
function normalizeAircraftForTTS(name) {
    if (!name) return name;
    // Boeing 7xx model numbers → digit by digit ("787" → "sieben acht sieben")
    // Airbus A-numbers stay as-is (read naturally as "A dreihundert...")
    return name.replace(/\b(7\d{2})\b/g, m => [...m].map(c => _TTS_D[+c]).join(' '));
}

function acAgePhrase(year) {
    if (!year) return '';
    const age = new Date().getFullYear() - parseInt(year);
    if (age < 0 || age > 80) return '';
    return `, ${age} Jahre alt`;
}

function buildSpeechText(f) {

    const ac     = normalizeAircraftForTTS((aircraftName(f.aircraft_code) || f.aircraft_code || '').replace(/-/g, ' '));
    const origin = apName(f.origin_airport_iata);
    const dest   = apName(f.destination_airport_iata);

    let text = 'Überflug';
    if (al) text += ` von ${al}`;

    if (origin && dest) text += `. Von ${origin} nach ${dest}.`;

async function _playAudioBlob(blob) {
    const url = URL.createObjectURL(blob);
    // Always use the persistent _ttsAudio element — works on all platforms including iOS
    // once _syncUnlockAudio has been called within a gesture.
    await new Promise(resolve => {
        const cleanup = () => { URL.revokeObjectURL(url); resolve(); };
        _ttsAudio.onended = cleanup;
        _ttsAudio.onerror = cleanup;
        _ttsAudio.src = url;
        _ttsAudio.load();
        _ttsAudio.play().catch(e => { console.warn('[TTS] play failed:', e); cleanup(); });
    });
}

// Client-side TTS queue — guarantees sequential non-overlapping playback on all devices
let _ttsQueue = Promise.resolve();

async function speak(text, pauseSpotify = false, chimeType = null) {
    _ttsQueue = _ttsQueue.then(() => _doSpeak(text, pauseSpotify, chimeType)).catch(() => {});
}

async function _doSpeak(text, pauseSpotify, chimeType) {
    if (IS_LOCAL) {
        // Local: server handles ducking, chime, TTS, and Spotify via afplay
        await fetch('/api/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, voice: selectedVoice(), pause_spotify: pauseSpotify, chime_type: chimeType })
        }).catch(() => {});
        return;
    }
    // Remote (Railway): browser-based TTS chain
    if (chimeType === 'big')        await playChime();
    else if (chimeType === 'small') await playDing();
    try {
        const resp = await fetch('/api/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, voice: selectedVoice() })
        });
        if (resp.ok) {
            const blob = await resp.blob();
            await _playAudioBlob(blob);
        }
    } catch(e) { console.warn('[TTS]', e); }
}

// Persistent <audio> element — pre-unlocked synchronously in gesture context for iOS
const _ttsAudio = new Audio();
let _audioCtx = null;
let _audioUnlocked = false;

async function getAudioCtx() {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state !== 'running') {
        try { await _audioCtx.resume(); } catch(e) {}
    }
    return _audioCtx;
}

// iOS: must be called synchronously within a user gesture (no await!).
// Wrapped in try/catch so no error leaks and breaks other click handlers.
function _syncUnlockAudio() {
    try {
        if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!_audioUnlocked) {
            // AudioContext: resume + start a 1-sample silent buffer (iOS needs a source node started)
            _audioCtx.resume().catch(() => {});
            const buf = _audioCtx.createBuffer(1, 1, _audioCtx.sampleRate);
            const src = _audioCtx.createBufferSource();
            src.buffer = buf; src.connect(_audioCtx.destination); src.start(0);
            // <audio> element: play silent data-URI to unlock for later src swaps
            _ttsAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
            _ttsAudio.play().catch(() => {});
            _audioUnlocked = true;
        }
        if (_audioCtx.state !== 'running') _audioCtx.resume().catch(() => {});
    } catch(e) { console.warn('[Audio] unlock failed:', e); }
}

document.addEventListener('click',      () => _syncUnlockAudio());
document.addEventListener('touchstart', () => _syncUnlockAudio(), { passive: true });
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && _audioCtx && _audioCtx.state !== 'running') _audioCtx.resume().catch(() => {});
});

function playChime() {
    return new Promise(async resolve => {
        try {
            const ctx = await getAudioCtx();

            // Master gain + soft compressor so it doesn't clip
            const comp = ctx.createDynamicsCompressor();
            comp.connect(ctx.destination);
            const master = ctx.createGain();
            master.gain.value = 0.55;
            master.connect(comp);

            // Inharmonic partials of a real bell (ratio, relative volume, decay multiplier)
            const partials = [
                [1.000, 1.00, 2.8],
                [2.000, 0.30, 1.2],
                [2.756, 0.55, 1.0],  // characteristic bell partial
                [5.404, 0.18, 0.6],
                [8.933, 0.08, 0.4],
            ];

            function bell(freq, startTime) {
                partials.forEach(([ratio, vol, decay]) => {
                    const osc = ctx.createOscillator();
                    const g   = ctx.createGain();
                    osc.connect(g);
                    g.connect(master);
                    osc.type = 'sine';
                    osc.frequency.value = freq * ratio;
                    g.gain.setValueAtTime(0, startTime);
                    g.gain.linearRampToValueAtTime(vol, startTime + 0.008);
                    g.gain.exponentialRampToValueAtTime(0.0001, startTime + decay);
                    osc.start(startTime);
                    osc.stop(startTime + decay + 0.05);
                });
            }

            // 4-tone ascending chime: C5 → E5 → G5 → C6
            const notes = [523.25, 659.25, 783.99, 1046.50];
            let t = ctx.currentTime + 0.08;
            notes.forEach(freq => { bell(freq, t); t += 0.52; });

            setTimeout(resolve, 2900);
        } catch { resolve(); }
    });
}

async function playDing() {
    try {
        const ctx = await getAudioCtx();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = 880;
        const t = ctx.currentTime;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.105, t + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
        osc.start(t); osc.stop(t + 0.4);
    } catch {}
}

function playRwy18Chime() {
    return new Promise(async resolve => {
        try {
            const ctx = await getAudioCtx();
            const comp = ctx.createDynamicsCompressor();
            comp.connect(ctx.destination);
            const master = ctx.createGain();
            master.gain.value = 0.15;
            master.connect(comp);

            const partials = [
                [1.000, 1.00, 1.8],
                [2.756, 0.45, 0.9],
                [5.404, 0.12, 0.5],
            ];
            function bell(freq, startTime) {
                partials.forEach(([ratio, vol, decay]) => {
                    const osc = ctx.createOscillator();
                    const g   = ctx.createGain();
                    osc.connect(g); g.connect(master);
                    osc.type = 'sine';
                    osc.frequency.value = freq * ratio;
                    g.gain.setValueAtTime(0, startTime);
                    g.gain.linearRampToValueAtTime(vol, startTime + 0.008);
                    g.gain.exponentialRampToValueAtTime(0.0001, startTime + decay);
                    osc.start(startTime); osc.stop(startTime + decay + 0.05);
                });
            }
            // D-Dur Dreiklang D5 → F#5 → A5, schnell & prägnant
            const notes = [587.33, 739.99, 880.00];
            let t = ctx.currentTime + 0.08;
            notes.forEach(freq => { bell(freq, t); t += 0.28; });
            setTimeout(resolve, 1200);
        } catch { resolve(); }
    });
}

function _passoverFromDir(f) {
    if (isRwy18Departure(f)) return 'von der 18 kommend';
    if (!f.latitude || !f.longitude) return null;
    const abs = _loungerBearing(f).abs;
    const dirs = ['Norden','Nordosten','Osten','Südosten','Süden','Südwesten','Westen','Nordwesten'];
    return 'von ' + dirs[Math.round(abs / 45) % 8];
}

function buildPassoverText(f) {
    const al   = airlineName(f.airline_iata, f.airline_icao);
    const ac   = normalizeAircraftForTTS((aircraftName(f.aircraft_code) || f.aircraft_code || '').replace(/-/g, ' '));
    const age  = acAgePhrase(f.year);
    const orig = apName(f.origin_airport_iata);
    const dest = apName(f.destination_airport_iata);
    const isApproaching = approachStatus(f)?.label === 'Auf dich zu';
    let text;
    if (isApproaching) {
        // Flight is heading toward user — look straight up; mention where it comes from
        text = 'Schau nach oben';
        const dir = _passoverFromDir(f);
        if (dir) text += `, ${dir}`;
    } else {
        // Flight is passing by — tell the user which direction to look
        const abs = _loungerBearing(f).abs;
        const dirs = ['Norden','Nordosten','Osten','Südosten','Süden','Südwesten','Westen','Nordwesten'];
        const lookDir = isRwy18Departure(f) ? 'Norden' : dirs[Math.round(abs / 45) % 8];
        text = `Schau nach ${lookDir}`;
    }
    if (al) text += `, ${al}`;
    if (ac) text += `, ${ac}`;
    text += age;
    if (orig && dest) text += `. Von ${orig} nach ${dest}.`;
    else if (dest)    text += `. Nach ${dest}.`;
    else if (orig)    text += `. Von ${orig}.`;
    else text += '.';
    return text;
}

async function announcePassover(f) {
    speak(buildPassoverText(f), true, 'small');
}

function _loungerBearing(f) {
    // Bearing from user to flight, relative to lounger look direction (255°)
    const dLat = f.latitude - userLat;
    const dLon = (f.longitude - userLon) * Math.cos(userLat * Math.PI / 180);
    const abs = (Math.atan2(dLon, dLat) * 180 / Math.PI + 360) % 360;
    return { abs, rel: (abs - 255 + 360) % 360 };
}

function _isBalconyVisible(f) {
    // Visible from lounger if within 200° forward arc (look dir 255°); excludes south
    if (!f.latitude || !f.longitude) return false;
    return _loungerBearing(f).rel < 200;
}

function _elevationDeg(f) {
    if (!f.altitude_ft || !f.distance_km || f.distance_km <= 0) return 0;
    return Math.atan2(f.altitude_ft * 0.3048, f.distance_km * 1000) * 180 / Math.PI;
}

function _isOverflight(f) {
    // Only elevation-based: ≥45° in the narrower 160° arc (WSW→NW→N→NNO)
    // Approaching flights get Balkonblick first, Schau-nach-oben when elevation is reached
    return _loungerBearing(f).rel < 160 && _elevationDeg(f) >= 45;
}

function _passoverDistThresh(f) {
    if (isRwy18Departure(f)) return 5;
    const { rel } = _loungerBearing(f);
    const approaching = approachStatus(f)?.label === 'Auf dich zu';
    if (rel < 200) {
        // Only the narrow west-facing arc (rel < 45° ≈ WSW–WNW) gets the 15 km
        // early warning — those flights approach from the balcony view direction.
        // Everything else (NW, N, NE, overhead) fires at 5 km.
        if (approaching && rel < 45) return 15;
        return 5;
    }
    if (rel < 280) return 3;  // East: house blocks until 3 km
    return 1;                 // South: house blocks fully until 1 km
}

function _balconyLookDir(f) {
    // Liegestuhl: Blick nach West leicht südlich (~255°)
    // geradeaus=WSW, rechts=NNW, hinten=ONO
    const dLat = f.latitude - userLat;
    const dLon = f.longitude - userLon;
    const bear = (Math.atan2(dLon, dLat) * 180 / Math.PI + 360) % 360;
    const rel  = (bear - 255 + 360) % 360;
    if (rel < 30 || rel > 330) return 'geradeaus';       // WSW
    if (rel >= 30  && rel < 75)  return 'rechts vorne';  // NW
    if (rel >= 75  && rel < 150) return 'direkt rechts'; // N / NNO
    if (rel >= 150 && rel < 200) return 'rechts hinten'; // NO
    return 'hinter dir';                                  // O
}

function buildBalconyText(f) {
    const al   = airlineName(f.airline_iata, f.airline_icao);
    const ac   = normalizeAircraftForTTS((aircraftName(f.aircraft_code) || f.aircraft_code || '').replace(/-/g, ' '));
    const orig = apName(f.origin_airport_iata);
    const dest = apName(f.destination_airport_iata);
    const age  = acAgePhrase(f.year);
    const dir  = _balconyLookDir(f);
    const km   = Math.round(f.distance_km);
    let text = `Balkonblick, ${dir}, ${km} Kilometer`;
    if (al) text += `, ${al}`;
    if (ac) text += `, ${ac}`;
    text += age;
    if (orig && dest) text += `. Von ${orig} nach ${dest}.`;
    else if (dest)    text += `. Nach ${dest}.`;
    else if (orig)    text += `. Von ${orig}.`;
    else text += '.';
    return text;
}

async function announceBalcony(f) {

/* ── Helpers ── */
function headingLabel(h) {
    if (h==null) return '';
    return ['N','NO','O','SO','S','SW','W','NW'][Math.round(h/45)%8];
}

function fmtTime(ts) {
    if (!ts) return null;
    return new Date(ts*1000).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}

function approachStatus(f) {
    if (f.heading==null) return null;
    const dLon=(userLon-f.longitude)*Math.PI/180;
    const φ1=f.latitude*Math.PI/180, φ2=userLat*Math.PI/180;
    const bearing=(Math.atan2(
        Math.sin(dLon)*Math.cos(φ2),
        Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(dLon)
    )*180/Math.PI+360)%360;
    const diff=Math.abs(((f.heading-bearing)+180)%360-180);
    if (diff<45)  return {label:'Auf dich zu', color:'#00d4aa', dot:'#00d4aa'};
    if (diff>135) return {label:'Von dir weg', color:'#475569', dot:'#334155'};
    return             {label:'Fliegt vorbei', color:'#f59e0b', dot:'#f59e0b'};
}

/* ── Radar SVG ── */
function radarSVG(f, sz) {
    sz = sz || 118;
    const radiusKm = parseFloat(document.getElementById('radiusSelect').value);
    const cx=59, cy=59, maxR=50;
    const dLon=(f.longitude-userLon)*Math.PI/180;
    const φ1=userLat*Math.PI/180, φ2=f.latitude*Math.PI/180;
    const yb=Math.sin(dLon)*Math.cos(φ2);
    const xb=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(dLon);
    const bearing=(Math.atan2(yb,xb)*180/Math.PI+360)%360;
    const br=bearing*Math.PI/180;
    const dist=Math.min(f.distance_km/radiusKm,.92);
    const px=cx+Math.sin(br)*dist*maxR;
    const py=cy-Math.cos(br)*dist*maxR;
    const h=f.heading||0;
    const planeColor = isMilitary(f) ? '#3b82f6' : '#00d4aa';
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 118 118" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${maxR}" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,3"/>
      <circle cx="${cx}" cy="${cy}" r="${maxR*.5}" fill="none" stroke="#111827" stroke-width="1"/>
      <line x1="${cx}" y1="${cy-maxR}" x2="${cx}" y2="${cy+maxR}" stroke="#111827" stroke-width=".6"/>
      <line x1="${cx-maxR}" y1="${cy}" x2="${cx+maxR}" y2="${cy}" stroke="#111827" stroke-width=".6"/>
      <text x="${cx}" y="${cy-maxR-3}" text-anchor="middle" fill="#243855" font-size="8" font-family="monospace">N</text>
      <text x="${cx}" y="${cy+maxR+10}" text-anchor="middle" fill="#243855" font-size="8" font-family="monospace">S</text>
      <text x="${cx+maxR+7}" y="${cy+3}" text-anchor="middle" fill="#243855" font-size="8" font-family="monospace">O</text>
      <text x="${cx-maxR-7}" y="${cy+3}" text-anchor="middle" fill="#243855" font-size="8" font-family="monospace">W</text>
      <line id="rln-${f.id}" x1="${cx}" y1="${cy}" x2="${px}" y2="${py}" stroke="${planeColor}" stroke-width=".8" stroke-dasharray="3,3" opacity=".4"/>
      <circle cx="${cx}" cy="${cy}" r="4" fill="#00d4aa" opacity=".85"/>
      <circle cx="${cx}" cy="${cy}" r="2" fill="#060911"/>
      <g id="rpl-${f.id}" transform="translate(${px},${py}) rotate(${h})">
        <rect x="-1.8" y="-7.5" width="3.6" height="15" rx="1.8" fill="${planeColor}"/>
        <rect x="-7.5" y="-2" width="15" height="3.2" rx="1.5" fill="${planeColor}"/>
        <rect x="-3.5" y="5" width="7" height="2.2" rx="1" fill="${planeColor}"/>
      </g>
    </svg>`;
}

/* ── Compact card for flights without airline/route (e.g. gliders) ── */
function renderCompactCard(f) {
    const acModel = aircraftName(f.aircraft_code);
    const reg = f.registration || f.callsign || f.id;
    return `
    <div class="card compact" id="card-${f.id}">
        <div class="compact-inner">
            <div class="compact-callsign">${f.callsign || f.id}</div>
            <div class="compact-type">${acModel || f.aircraft_code || '–'}${reg && reg !== f.callsign ? ' · ' + reg : ''}</div>
            <div class="compact-stats">
                <span><span class="dist-interp">${_odHtml(f.distance_km)}</span> km</span>
                <span>${f.altitude_ft ? Math.round(f.altitude_ft).toLocaleString('de') + ' ft' : '–'}</span>
                <span>${f.ground_speed_kmh ? f.ground_speed_kmh + ' km/h' : '–'}</span>
            </div>
        </div>
    </div>`;
}

const GLIDER_CODES = new Set(['GLID','BALL','ULAC','GYRO','PARA','HANG']);
const MILITARY_ICAO = new Set([
    'RCH','SAM','GAF','RAF','NAF','FAF','BAF','HAF','DAF','CAF','TAF','PAF',
    'SVF','RFF','NATO','USAF','USCG','USN','USMC','RNZ','RAAF','IAF','FAB',
    'GFA','CFC','LFA','HRZ','POL','CEF','ROU','CHB','RBS',
]);
const MILITARY_AC = new Set([
    'C17','C130','C5M','C5','C17A','KC135','KC10','KC46A','KC46',
    'B52','B52H','B1','B1B','B2','B2A','F16','F15','F18','F22','F35',
    'A10','U2','E3','E3TF','P8','RC135','RC12','E8','E6','C21',
    'C12','C20','C32','C37','C40','G5','GLF5','FA18',
]);
function isMilitary(f) {
    return MILITARY_ICAO.has(f.airline_icao) || MILITARY_AC.has(f.aircraft_code);
}
function isCompact(f) {
    if (isMilitary(f)) return false;
    if (GLIDER_CODES.has(f.aircraft_code)) return true;
    return !f.airline_iata && !f.airline_icao;
}

/* ── Big Card (top 2 closest) ── */
function renderBigCard(f, isNew) {
    const status   = approachStatus(f);
    const airline  = airlineName(f.airline_iata, f.airline_icao);
    const acModel  = aircraftName(f.aircraft_code) || f.aircraft_code || '–';
    const originIata = f.origin_airport_iata || '';
    const destIata   = f.destination_airport_iata || '';
    const mil = isMilitary(f);

    const vs = f.vertical_speed_fpm || 0;
    let vsClass = 'vs-level', vsIcon = '→', vsShort = 'Level';
    if (vs > 100)  { vsClass = 'vs-up';   vsIcon = '▲'; vsShort = `+${Math.round(vs).toLocaleString('de')}`; }
    if (vs < -100) { vsClass = 'vs-down'; vsIcon = '▼'; vsShort = `${Math.round(vs).toLocaleString('de')}`; }

    const approachBadge = status ? `
        <div class="bc-approach" style="background:${status.color}20;border:1px solid ${status.color}44;color:${status.color}">

    const logoHTML = mil
        ? '<span class="military-badge">✦ MILITARY</span>'

            <div class="bc-route-mid">

            <div class="bc-ap-block right">

            const spec = f.aircraft_code ? AC_SPECS[f.aircraft_code.toUpperCase()] : null;

            const rangeStr = spec.range ? spec.range.toLocaleString('de') + ' km' : null;
            const spanStr  = spec.span  ? spec.span.toFixed(1).replace('.',',') + ' m' : null;
            const decoded  = decodeVariant(f.aircraft_code, f.type_name_full);
            // If variant decode found the specific fitted engine, show only that; otherwise all options
            const engCount = (spec.eng.match(/^(\d+×\s*)/) || [])[1] || '';
            const engStr   = decoded.engine ? engCount + decoded.engine : spec.eng;
            const prodStr  = decoded.prod || spec.prod || null;

        })()}

}
