/* ── Announcement logic — runs on ALL flights (up to 150 km), independent of display radius ── */
function _runAnnouncements(allFlights) {
    const allIds = new Set(allFlights.map(f => f.id));
    const oldIds = _prevAnnouncementIds;
    _prevAnnouncementIds = allIds;
    const displayRadius = parseFloat(document.getElementById('radiusSelect').value);

    if (_firstRender) {
        _firstRender = false;
        // Silently pre-populate only flights that currently qualify — prevents reload flood
        // while leaving out-of-range flights eligible for future announcements
        allFlights.forEach(f => {
            if (f.distance_km <= displayRadius) dingedIds.add(f.id);
            if (f.distance_km <= 5) { announcedOverhead.add(f.id); announcedPassover.add(f.id); }
            if (f.distance_km <= _passoverDistThresh(f) || _elevationDeg(f) >= 45) announcedPassover.add(f.id);
            const _bMaxDist = (approachStatus(f)?.label === 'Auf dich zu') ? 25 : 15;
            if (f.distance_km <= _bMaxDist && _isBalconyVisible(f)) {
                announcedBalcony.add(f.id);
                if (approachStatus(f)?.label === 'Auf dich zu') announcedOverhead.add(f.id);
            }
        });
        return;
    }

    // Pre-mark approaching visible flights (only when balcony is enabled)
    if (_balconyEnabled) allFlights.forEach(f => {
        if (isCompact(f)) return;
        if (announcedBalcony.has(f.id)) return;
        if (f.distance_km > 25) return;
        if (!_isBalconyVisible(f)) return;
        // Runway-18 departures: suppress Balkonblick + overhead, passover only
        if (isRwy18Departure(f)) {
            announcedBalcony.add(f.id);
            announcedOverhead.add(f.id);
            return;
        }
        if (approachStatus(f)?.label !== 'Auf dich zu') return;
        announcedOverhead.add(f.id);        // suppress overhead so Balkonblick/passover gets priority
        if (_isOverflight(f)) announcedBalcony.add(f.id); // true overflight → suppress Balkonblick too
        // announcedPassover NOT set → passover fires when close/high
    });

    // Ding only for new flights within display radius that are approaching
    allFlights.forEach(f => {
        if (f.distance_km > displayRadius) return;
        if (!oldIds.has(f.id) && !dingedIds.has(f.id)) {
            const st = approachStatus(f);
            if (st && st.label === 'Auf dich zu') {
                dingedIds.add(f.id);
                playDing();
            }
        }
    });
    for (const id of dingedIds) { if (!allIds.has(id)) dingedIds.delete(id); }

    _checkThresholds(allFlights);

    for (const id of announcedOverhead) { if (!allIds.has(id)) announcedOverhead.delete(id); }
    for (const id of announcedPassover)  { if (!allIds.has(id)) announcedPassover.delete(id); }
    for (const id of announcedBalcony)   { if (!allIds.has(id)) announcedBalcony.delete(id); }
}

// Distance-threshold checks separated so the interpolation tick can call them too
function _checkThresholds(allFlights) {
    // Overhead: ≤5 km, heading toward user — always fires regardless of balcony toggle
    allFlights.filter(f => {
        if (isCompact(f)) return false;
        if (announcedOverhead.has(f.id)) return false;
        if (f.distance_km > 5) return false;
        const st = approachStatus(f);
        return st && st.label === 'Auf dich zu';
    }).forEach(f => {
        announcedOverhead.add(f.id);
        announcedPassover.add(f.id);
        announce(f);
    });

    // Passover: rwy18 → ≤5.5km; other overflights → direction-based; or elevation ≥45° (balcony on only)
    allFlights.filter(f => {
        if (isCompact(f)) return false;
        if (announcedPassover.has(f.id)) return false;
        if (_balconyEnabled) return f.distance_km <= _passoverDistThresh(f) || _elevationDeg(f) >= 45;
        return f.distance_km <= 5;
    }).forEach(f => {
        announcedPassover.add(f.id);
        announcePassover(f);
    });

    // Balcony: visible flights — 25 km approaching, 15 km passing; never for rwy18
    allFlights.filter(f => {
        if (isCompact(f)) return false;
        if (announcedBalcony.has(f.id)) return false;
        if (announcedPassover.has(f.id)) return false;
        if (!_isBalconyVisible(f)) return false;
        if (isRwy18Departure(f)) return false;
        const maxDist = (approachStatus(f)?.label === 'Auf dich zu') ? 25 : 15;
        if (f.distance_km > maxDist) return false;
        return true;
    }).forEach(f => {
        announcedBalcony.add(f.id);
        if (_balconyEnabled) announceBalcony(f);
    });
}

/* ── Render flights from data ── */
function renderBalconyRadar() {
    const svg = document.getElementById('balconyRadarSvg');
    if (!svg) return;
    const cx = 109, cy = 109, maxR = 100, maxKm = 25;
    const scale = maxR / maxKm;
    const displayRadius = parseFloat(document.getElementById('radiusSelect').value);

    let s = '';

    // Background circle
    s += `<circle cx="${cx}" cy="${cy}" r="${maxR}" fill="#07101f"/>`;

    // Range rings
    [5, 10, 20].forEach(km => {
        const r = km * scale;
        s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3"/>`;
        s += `<text x="${cx + r + 2}" y="${cy - 2}" font-size="7" fill="#334155">${km}</text>`;
    });

    // Display-radius ring overlay
    if (displayRadius <= maxKm) {
        const dr = displayRadius * scale;
        s += `<circle cx="${cx}" cy="${cy}" r="${dr}" fill="none" stroke="#00d4aa" stroke-width="1" stroke-dasharray="4,2" opacity="0.35"/>`;
    }

    // Cardinal labels
    s += `<text x="${cx}" y="${cy - maxR + 9}" font-size="9" fill="#00d4aa" text-anchor="middle" font-weight="700">N</text>`;
    s += `<text x="${cx}" y="${cy + maxR - 2}" font-size="9" fill="#334155" text-anchor="middle">S</text>`;
    s += `<text x="${cx + maxR - 3}" y="${cy + 4}" font-size="9" fill="#334155" text-anchor="middle">O</text>`;
    s += `<text x="${cx - maxR + 5}" y="${cy + 4}" font-size="9" fill="#334155" text-anchor="middle">W</text>`;

    // Flights
    (_lastAllFlights || []).forEach(f => {
        if (!f.latitude || !f.longitude) return;
        if (isCompact(f)) return;
        const dLat = f.latitude - userLat;
        const dLon = (f.longitude - userLon) * Math.cos(userLat * Math.PI / 180);
        const distKm = Math.sqrt(dLat * dLat + dLon * dLon) * 111;
        if (distKm > maxKm) return;
        const bearing = (Math.atan2(dLon, dLat) * 180 / Math.PI + 360) % 360;
        const px = cx + Math.sin(bearing * Math.PI / 180) * distKm * scale;
        const py = cy - Math.cos(bearing * Math.PI / 180) * distKm * scale;

        const overhead = distKm <= 5;
        const inRadius = distKm <= displayRadius;
        const isBalconyVisible = distKm <= 20 && _isBalconyVisible(f);
        const color = isMilitary(f) ? '#3b82f6' :
            overhead ? '#f97316' :
            isBalconyVisible ? '#a855f7' :
            (inRadius && isLargeAircraft(f.aircraft_code)) ? '#ef4444' :
            inRadius ? '#00d4aa' : '#475569';

        // Heading line
        if (f.heading != null) {
            const hr = f.heading * Math.PI / 180;
            s += `<line id="brh-${f.id}" x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${(px + Math.sin(hr) * 9).toFixed(1)}" y2="${(py - Math.cos(hr) * 9).toFixed(1)}" stroke="${color}" stroke-width="1.5" opacity="0.75"/>`;
        }

        const label = f.callsign || f.id || '';
        s += `<circle id="brd-${f.id}" cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="4" fill="${color}" opacity="0.92"><title>${label} · ${distKm.toFixed(1)}km${f.destination_airport_iata ? ' → ' + f.destination_airport_iata : ''}</title></circle>`;
    });

    // User dot (drawn last, on top)
    s += `<circle cx="${cx}" cy="${cy}" r="4" fill="#00d4aa"/>`;
    s += `<circle cx="${cx}" cy="${cy}" r="7" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>`;

    // Clip to circle
    svg.innerHTML = `<defs><clipPath id="radarClip"><circle cx="${cx}" cy="${cy}" r="${maxR}"/></clipPath></defs><g clip-path="url(#radarClip)">${s}</g>`;
}

function _updateBalconyRadar() {
    const cx = 109, cy = 109, maxKm = 25, scale = 100 / maxKm;
    const cosLat = Math.cos(userLat * Math.PI / 180);
    (_lastAllFlights || []).forEach(f => {
        const b = _interpBases.get(f.id);
        if (!b || b._iLat == null) return;
        const dLat = b._iLat - userLat;
        const dLon = (b._iLon - userLon) * cosLat;
        const distKm = Math.sqrt(dLat * dLat + dLon * dLon) * 111;
        if (distKm > maxKm) return;
        const bearing = (Math.atan2(dLon, dLat) * 180 / Math.PI + 360) % 360;
        const px = cx + Math.sin(bearing * Math.PI / 180) * distKm * scale;
        const py = cy - Math.cos(bearing * Math.PI / 180) * distKm * scale;
        const dot = document.getElementById(`brd-${f.id}`);
        if (dot) { dot.setAttribute('cx', px.toFixed(1)); dot.setAttribute('cy', py.toFixed(1)); }
        const hdg = document.getElementById(`brh-${f.id}`);
        if (hdg && b.heading != null) {
            const hr = b.heading * Math.PI / 180;
            hdg.setAttribute('x1', px.toFixed(1)); hdg.setAttribute('y1', py.toFixed(1));
            hdg.setAttribute('x2', (px + Math.sin(hr) * 9).toFixed(1));
            hdg.setAttribute('y2', (py - Math.cos(hr) * 9).toFixed(1));
        }
    });
}

function renderFlights(flights, source) {
    const newIds = new Set(flights.map(f => f.id));
    const oldIds = previousIds;
    previousIds = newIds;
    currentFlights = flights;

    document.getElementById('countNum').textContent = flights.length;
    const st = document.getElementById('sourceTag');
    if (source) { st.textContent = source==='fr24'?'FlightRadar24':'OpenSky'; st.style.display=''; }

    const list = document.getElementById('flightList');
    if (flights.length === 0) {
        list.innerHTML = `<div class="state-msg"><div class="icon">🔭</div>
            <div class="text">Keine Flugzeuge im Radius</div>
            <div class="hint">Versuche einen größeren Radius</div></div>`;
        try { renderBalconyRadar(); } catch(e) { console.warn('balconyRadar:', e); }
        return;
    }
    const main = flights.filter(f => !isCompact(f));
    const comp = flights.filter(f =>  isCompact(f));
    const bigCards = main.slice(0, 2);
    const restMain = main.slice(2);
    let html = bigCards.map(f => renderBigCard(f, !oldIds.has(f.id))).join('');
    if (restMain.length > 0 || comp.length > 0) {
        html += '<div class="secondary-list"><div class="secondary-list-title">Weitere Flugzeuge</div>';
        html += [...restMain, ...comp].map(f => renderCard(f, false)).join('');
        html += '</div>';
    }
    list.innerHTML = html;
    try { renderBalconyRadar(); } catch(e) { console.warn('balconyRadar:', e); }
}

/* ── Leaflet map ── */
function mapTileUrl() {
    return document.body.classList.contains('light')
        ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
}

function initMap() {
    if (_map) return;
    _map = L.map('map', { zoomControl: true }).setView([DEFAULT_LAT, DEFAULT_LON], 10);
    _tileLayer = L.tileLayer(mapTileUrl(), { attribution: '© OpenStreetMap © CARTO', maxZoom: 18 }).addTo(_map);
    L.circleMarker([userLat, userLon], {
        radius: 7, color: '#00d4aa', fillColor: '#00d4aa', fillOpacity: 1, weight: 2
    }).addTo(_map).bindPopup('📍 Dein Standort');
}

function isLargeAircraft(code) {
    if (!code) return false;
    const c = code.toUpperCase();
    // Wide-body + 4-engine
    return c.startsWith('A34') || c.startsWith('A38') || c.startsWith('B74') ||
           c.startsWith('A33') || c.startsWith('A35') || c.startsWith('B76') ||
           c.startsWith('B77') || c.startsWith('B78') || c.startsWith('A30') ||
           c === 'IL96';
}

function isRwy18Departure(f) {
    // Runway 18 EDDF (Nordwestbahn): N-threshold 50.0503°N 8.5344°E, heading 178°
    if (!f.latitude || !f.longitude || !f.heading) return false;
    if ((f.altitude_ft  || 0) > 8000) return false;   // above initial climb = exclude
    if ((f.ground_speed_kmh || 0) < 150) return false; // too slow = not airborne
    const hdgDiff = Math.abs(((f.heading - 178) + 180) % 360 - 180);
    if (hdgDiff > 20) return false;
    const dlat = f.latitude  - 50.0503;
    const dlon = (f.longitude - 8.5344) * Math.cos(50.0503 * Math.PI / 180);
    return Math.sqrt(dlat * dlat + dlon * dlon) * 111 < 12;
}

function planeIcon(color, heading, small, acCode, showStar) {
    const rot = heading || 0;
    const large = !small && isLargeAircraft(acCode);
    const sz  = large ? 52 : 36;
    const off = sz / 2;
    // Single white star centered on the aircraft body; inside rotation group so it rotates with the plane
    const wingStars = showStar
        ? `<text x="896" y="640" font-size="340" fill="white" text-anchor="middle" dominant-baseline="central" opacity="0.92">★</text>`
        : '';
    const html = `<svg width="${sz}" height="${sz}" viewBox="0 -256 1792 1792" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(${rot}, 896, 640)">
            <g transform="matrix(0.70710678,-0.70710678,-0.70710678,-0.70710678,898.14773,1786.3393)" fill="${color}">
                <path d="m 1397,1324 q 0,-87 -149,-236 l -240,-240 143,-746 1,-6 q 0,-14 -9,-23 L 1079,9 q -9,-9 -23,-9 -21,0 -29,18 L 753,593 508,348 Q 576,110 576,96 576,82 567,73 L 503,9 Q 494,0 480,0 462,0 452,16 L 297,296 17,451 q -17,9 -17,28 0,14 9,23 l 64,65 q 9,9 23,9 14,0 252,-68 L 593,753 18,1027 q -18,8 -18,29 0,14 9,23 l 64,64 q 9,9 23,9 4,0 6,-1 l 746,-143 240,240 q 149,149 236,149 32,0 52.5,-20.5 20.5,-20.5 20.5,-52.5 z"/>
            </g>
            ${wingStars}
        </g>
    </svg>`;
    return L.divIcon({ html, iconSize: [sz, sz], iconAnchor: [off, off], className: '' });
}

function updateMap(allFlights) {
    if (!_map) return;
    const radius = parseFloat(document.getElementById('radiusSelect').value);
    const seen = new Set();

    allFlights.forEach(f => {
        seen.add(f.id);
        const inRadius = f.distance_km <= radius;
        const overhead = f.distance_km <= (isCompact(f) ? 1 : 3);
        const isSelected = _selectedFlight === f.id;

        // Runway 18 star: eastern-dest departure — set on qualifying takeoff, clear once past user
        const destLL = AP_LL[f.destination_airport_iata];
        if (isRwy18Departure(f) && destLL && destLL[1] > 8.5344) {
            if (!_rwy18Stars.has(f.id)) {
                _rwy18Stars.add(f.id);
                if (!_mapFirstUpdate && IS_LOCAL) playRwy18Chime();
            }
        }
        if (_rwy18Stars.has(f.id) && f.latitude < userLat) {
            _rwy18Stars.delete(f.id);
        }
        const hasStar = _rwy18Stars.has(f.id);

        const color = isSelected ? '#00d4aa' :
            isMilitary(f) ? '#3b82f6' :
            isRwy18Departure(f) ? '#a855f7' :
            overhead ? '#f97316' : (inRadius && isLargeAircraft(f.aircraft_code)) ? '#ef4444' : inRadius ? '#00d4aa' : '#475569';
        const popup = `<b>${f.callsign||f.id}</b><br>${f.airline_iata||f.airline_icao||'–'} · ${f.aircraft_code||'–'}<br>${f.origin_airport_iata||'?'} → ${f.destination_airport_iata||'?'}<br>${f.altitude_ft ? Math.round(f.altitude_ft).toLocaleString('de')+' ft' : '–'} · ${f.distance_km} km`;

        const onMarkerClick = () => {
            _selectedFlight = f.id;
            _selectedDestLL = destLL || null;
            _selectedDestIata = f.destination_airport_iata || null;
            _applyMapSelection();
            _renderSelectedCard(f);
            if (destLL && f.latitude && f.longitude) {
                _map.fitBounds([[f.latitude, f.longitude], destLL], { padding: [40, 40], maxZoom: 8 });
            }
        };

        // Use interpolated anchor as position — avoids snap on server push
        const _b = _interpBases.get(f.id);
        const mLat = (_b && _b.baseLat != null) ? _b.baseLat : f.latitude;
        const mLon = (_b && _b.baseLon != null) ? _b.baseLon : f.longitude;

        if (isCompact(f)) {
            if (_markers[f.id]) {
                _markers[f.id].setStyle({ color, fillColor: color });
            } else {
                _markers[f.id] = L.circleMarker([mLat, mLon], {
                    radius: 5, color, fillColor: color, fillOpacity: 1, weight: 1.5
                }).addTo(_map).on('click', onMarkerClick);
            }
        } else {
            const sig = `${color}|${f.heading}|${hasStar}`;
            if (_markers[f.id]) {
                if (_markerSigs[f.id] !== sig) {
                    _markers[f.id].setIcon(planeIcon(color, f.heading, false, f.aircraft_code, hasStar));
                    _markerSigs[f.id] = sig;
                }
                // position owned by _interpTick at 60fps
            } else {
                _markers[f.id] = L.marker([mLat, mLon], {
                    icon: planeIcon(color, f.heading, false, f.aircraft_code, hasStar)
                }).addTo(_map).on('click', onMarkerClick);
                _markerSigs[f.id] = sig;
            }
        }

        // Destination dashed line — start point kept current by _interpTick
        if (destLL && f.latitude && f.longitude) {
            if (!_destLines[f.id]) {
                _destLines[f.id] = L.polyline([[mLat, mLon], destLL], {
                    color: '#94a3b8', weight: 1, opacity: 0.45, dashArray: '5 8'
                }).addTo(_map);
            }
        } else if (_destLines[f.id]) {
            _map.removeLayer(_destLines[f.id]); delete _destLines[f.id];
        }
    });

    Object.keys(_markers).forEach(id => {
        if (!seen.has(id)) { _map.removeLayer(_markers[id]); delete _markers[id]; delete _markerSigs[id]; _rwy18Stars.delete(id); }
    });
    Object.keys(_destLines).forEach(id => {
        if (!seen.has(id)) { _map.removeLayer(_destLines[id]); delete _destLines[id]; }
    });
    // Clear selection if the selected flight has disappeared
    if (_selectedFlight && !seen.has(_selectedFlight)) {
        _selectedFlight = null;
        _selectedDestLL = null;
        _selectedDestIata = null;
        if (_destMarker) { _map.removeLayer(_destMarker); _destMarker = null; }
        _clearSelectedCard();
    }
    _applyMapSelection();
    // Refresh selected card with latest data
    if (_selectedFlight) {
        const selF = allFlights.find(x => x.id === _selectedFlight);
        if (selF) _renderSelectedCard(selF);
    }
    // Update runway 18 east counter
    const rwy18El = document.getElementById('rwy18Num');
    if (rwy18El) rwy18El.textContent = _rwy18Stars.size;
    _mapFirstUpdate = false;
}

function _renderSelectedCard(f) {
    const el = document.getElementById('mapSelectedCard');
    if (!el) return;
    el.style.display = 'block';
    el.innerHTML = renderBigCard(f, false);
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function _clearSelectedCard() {
    const el = document.getElementById('mapSelectedCard');
    if (el) { el.style.display = 'none'; el.innerHTML = ''; }
}

function _applyMapSelection() {
    if (!_map) return;
    const sel = _selectedFlight;
    // Dest airport marker — always rebuild from stored dest data
    if (_destMarker) { _map.removeLayer(_destMarker); _destMarker = null; }
    if (sel && _selectedDestLL) {
        const iata = _selectedDestIata || '';
        const name = iata ? apName(iata) : '';
        const labelText = (name && name !== iata) ? `${iata} (${name})` : iata;
        const icon = L.divIcon({
            html: `<div style="width:180px;text-align:center;pointer-events:none">
                <span style="background:#00d4aa;color:#0f172a;font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;box-shadow:0 2px 8px #0005;border:1px solid rgba(0,0,0,0.15);display:inline-block;white-space:nowrap">${labelText}</span>
                <div style="width:10px;height:10px;border-radius:50%;background:#00d4aa;border:2px solid rgba(0,0,0,0.35);margin:4px auto 0"></div>
            </div>`,
            className: '',
            iconSize: [180, 38],
            iconAnchor: [90, 38]
        });
        _destMarker = L.marker(_selectedDestLL, { icon, interactive: false }).addTo(_map);
    }
    // Markers: hide others, show selected
    Object.keys(_markers).forEach(id => {
        const m = _markers[id];
        const visible = !sel || id === sel;
        if (typeof m.setOpacity === 'function') m.setOpacity(visible ? 1 : 0);
        else m.setStyle({ opacity: visible ? 1 : 0, fillOpacity: visible ? 1 : 0 });
    });
    // Dest lines: hide others, highlight selected
    Object.keys(_destLines).forEach(id => {
        if (sel && id === sel) {
            _destLines[id].setStyle({ color: '#00d4aa', weight: 2.5, opacity: 0.9, dashArray: '6 8' });
        } else {
            _destLines[id].setStyle({ opacity: 0 });
        }
    });
    // Reset button visibility
    const btn = document.getElementById('mapResetBtn');
    if (btn) btn.style.display = sel ? 'flex' : 'none';
}

function resetMapSelection() {
    _selectedFlight = null;
    _selectedDestLL = null;
    _selectedDestIata = null;
    if (_destMarker) { _map.removeLayer(_destMarker); _destMarker = null; }
    _clearSelectedCard();
    _applyMapSelection();
    if (_map) _map.setView([userLat, userLon], 10);
}

function toggleMap() {
    const wrap = document.getElementById('mapWrap');
    const btn  = document.getElementById('mapToggle');
    const show = getComputedStyle(wrap).display === 'none';
    wrap.style.display = show ? 'block' : 'none';
    btn.classList.toggle('active', show);
    if (show) { initMap(); if (_map) _map.invalidateSize(); updateMap(currentFlights); }
}

/* ── Odometer helpers ── */
function _odSig(str) {
    return str.split('').map(ch => ch === '.' ? '.' : 'N').join('');
}
function _odHtml(val) {
    const str = parseFloat(val).toFixed(1);
    const sig = _odSig(str);
    let inner = '';
    for (const ch of str) {
        if (ch === '.') {
            inner += '<span class="od-dot">.</span>';
        } else {
            const d = parseInt(ch, 10);
            let rows = '';
            for (let i = 0; i <= 9; i++) rows += `<span>${i}</span>`;
            inner += `<span class="od-col"><span class="od-strip" style="transform:translateY(${-d}em)">${rows}</span></span>`;
        }
    }
    return `<span class="od-wrap dist-od" data-od-sig="${sig}">${inner}</span>`;
}
function _odSet(el, val) {
    if (!el) return;
    const str = parseFloat(val).toFixed(1);
    const sig = _odSig(str);
    if (el.dataset.odSig !== sig) {
        el.dataset.odSig = sig;
        let inner = '';
        for (const ch of str) {
            if (ch === '.') {
                inner += '<span class="od-dot">.</span>';
            } else {
                const d = parseInt(ch, 10);
                let rows = '';
                for (let i = 0; i <= 9; i++) rows += `<span>${i}</span>`;
                inner += `<span class="od-col"><span class="od-strip" style="transform:translateY(${-d}em)">${rows}</span></span>`;
            }
        }
        el.innerHTML = inner;
        return;
    }
    const strips = el.querySelectorAll('.od-strip');
    let si = 0;
    for (const ch of str) {
        if (ch === '.') continue;
        if (strips[si]) strips[si].style.transform = `translateY(${-parseInt(ch, 10)}em)`;
        si++;
    }
}

/* ── Live distance interpolation ── */
// Stores the anchor state captured at each server push
const _interpBases = new Map();

function _updateInterpBases(allFlights) {
    const now = Date.now();
    const ids = new Set(allFlights.map(f => f.id));
    allFlights.forEach(f => {
        if (f.latitude != null && f.longitude != null &&
            f.ground_speed_kmh > 0 && f.heading != null) {
            _interpBases.set(f.id, {
                baseLat: f.latitude, baseLon: f.longitude,
                speed_kmh: f.ground_speed_kmh, heading: f.heading, baseTs: now
            });
        }
    });
    for (const id of _interpBases.keys()) { if (!ids.has(id)) _interpBases.delete(id); }
}

function _haversineDist(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
    const dφ = (lat2 - lat1) * Math.PI/180, dλ = (lon2 - lon1) * Math.PI/180;
    const a = Math.sin(dφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(dλ/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

let _lastOdUpdate = 0;
let _lastThresholdCheck = 0;
const _CX = 59, _CY = 59, _MAXR = 50;

function _interpTick() {
    requestAnimationFrame(_interpTick);
    if (!_lastAllFlights || !_lastAllFlights.length) return;
    const now = Date.now();
    const doOd = now - _lastOdUpdate >= 120;
    const doThresh = !_firstRender && now - _lastThresholdCheck >= 150;
    const radiusKm = parseFloat(document.getElementById('radiusSelect').value);

    // Dead-reckon each flight — store interpolated lat/lon on the base entry
    _lastAllFlights.forEach(f => {
        const b = _interpBases.get(f.id);
        if (!b) return;
        const elapsed = (now - b.baseTs) / 1000;
        if (elapsed < 0.016) return;
        const moved_km = b.speed_kmh * elapsed / 3600;
        const hr = b.heading * Math.PI / 180;
        const cosLat = Math.cos(b.baseLat * Math.PI / 180) || 0.001;
        b._iLat = b.baseLat + moved_km * Math.cos(hr) / 111.32;
        b._iLon = b.baseLon + moved_km * Math.sin(hr) / (111.32 * cosLat);
        f.distance_km = parseFloat(_haversineDist(userLat, userLon, b._iLat, b._iLon).toFixed(1));
    });

    // Update visible cards at full frame rate (radar) or throttled (odometer)
    currentFlights.forEach(f => {
        const b = _interpBases.get(f.id);

        // Radar position — 60 fps
        if (b && b._iLat != null) {
            const g  = document.getElementById(`rpl-${f.id}`);
            const ln = document.getElementById(`rln-${f.id}`);
            if (g || ln) {
                const dLon = (b._iLon - userLon) * Math.PI / 180;
                const φ1 = userLat * Math.PI / 180, φ2 = b._iLat * Math.PI / 180;
                const yb = Math.sin(dLon) * Math.cos(φ2);
                const xb = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(dLon);
                const bearing = (Math.atan2(yb, xb) * 180 / Math.PI + 360) % 360;
                const br = bearing * Math.PI / 180;
                const dist = Math.min(f.distance_km / radiusKm, .92);
                const px = (_CX + Math.sin(br) * dist * _MAXR).toFixed(2);
                const py = (_CY - Math.cos(br) * dist * _MAXR).toFixed(2);
                if (g)  g.setAttribute('transform', `translate(${px},${py}) rotate(${b.heading})`);
                if (ln) { ln.setAttribute('x2', px); ln.setAttribute('y2', py); }
            }
        }

        // Odometer — throttled to match CSS transition duration
        if (doOd) {
            const card = document.getElementById(`card-${f.id}`);
            if (card) card.querySelectorAll('.dist-od').forEach(el => _odSet(el, f.distance_km));
        }
    });

    // Balcony radar — 60 fps
    _updateBalconyRadar();

    // Leaflet map markers — 60 fps, sub-pixel via patched L.Marker.update
    if (_map) {
        _lastAllFlights.forEach(f => {
            const b = _interpBases.get(f.id);
            if (!b || b._iLat == null) return;
            const m = _markers[f.id];
            if (m) m.setLatLng([b._iLat, b._iLon]);
            const dl = _destLines[f.id];
            if (dl) {
                const destLL = AP_LL[f.destination_airport_iata];
                if (destLL) dl.setLatLngs([[b._iLat, b._iLon], destLL]);
            }
        });
    }

    if (doOd) _lastOdUpdate = now;
    if (doThresh) { _lastThresholdCheck = now; _checkThresholds(_lastAllFlights); }
}

requestAnimationFrame(_interpTick);

/* ── WebSocket ── */
function applyFlightData(allFlights, source) {
    const radius = parseFloat(document.getElementById('radiusSelect').value);
    allFlights.forEach(f => {
        f.distance_km = parseFloat(f.distance_km) || (() => {
            const dlat = f.latitude - userLat, dlon = f.longitude - userLon;
            return parseFloat((Math.sqrt(dlat*dlat + dlon*dlon) * 111).toFixed(1));
        })();
    });
    _lastAllFlights = allFlights;
    _updateInterpBases(allFlights);
    const flights = allFlights.filter(f => f.distance_km <= radius)
        .sort((a, b) => a.distance_km - b.distance_km);
    _runAnnouncements(allFlights);
    renderFlights(flights, source);
    updateMap(allFlights);
}

// Initial load via REST so data shows immediately on page open
fetch(`/api/flights?radius=150`)
    .then(r => r.json())
    .then(d => { if (d.flights?.length) applyFlightData(d.flights, d.source); })
    .catch(() => {});

const socket = io();

socket.on('flights_update', data => {
    applyFlightData(data.flights || [], data.source);
});

socket.on('connect', () => showToast('🔌 Verbunden', '#00d4aa'));
socket.on('disconnect', () => showToast('⚠ Verbindung getrennt', '#ef4444'));

document.getElementById('radiusSelect').addEventListener('change', () => {
    previousIds = new Set();
    const r = parseFloat(document.getElementById('radiusSelect').value);
    const filtered = currentFlights.filter(f => f.distance_km <= r)
        .sort((a,b) => a.distance_km - b.distance_km);
    renderFlights(filtered, null);
    updateMap(_lastAllFlights);
});
let _lastAllFlights = [];

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => { userLat = pos.coords.latitude; userLon = pos.coords.longitude; },
        () => {}
    );
}

/* ── Theme ── */
function applyTheme(light) {
    document.body.classList.toggle('light', light);
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = light ? '🌙' : '☀️';
    if (_map && _tileLayer) {
        _map.removeLayer(_tileLayer);
        _tileLayer = L.tileLayer(mapTileUrl(), { attribution: '© OpenStreetMap © CARTO', maxZoom: 18 }).addTo(_map);
    }
}

function toggleTheme() {
    const light = !document.body.classList.contains('light');
    localStorage.setItem('theme', light ? 'light' : 'dark');
    applyTheme(light);
}

applyTheme(localStorage.getItem('theme') === 'light');

const _voiceSel = document.getElementById('voiceSelect');
const _savedVoice = localStorage.getItem('ttsVoice');
if (_savedVoice && _voiceSel.querySelector(`option[value="${_savedVoice}"]`)) {
    _voiceSel.value = _savedVoice;
}
_voiceSel.addEventListener('change', () => localStorage.setItem('ttsVoice', _voiceSel.value));

/* ── Info Modal ── */
function openInfoModal(flightId) {
    const f = currentFlights.find(x => x.id === flightId);
    if (!f) return;

    const overlay = document.getElementById('infoModal');
    overlay.classList.add('open');
    overlay.scrollTop = 0;

    const photoEl  = document.getElementById('imPhoto');
    const photoBox = document.getElementById('imPhotoPlaceholder');
    photoEl.style.display = 'none';
    photoEl.src = '';
    photoBox.style.display = 'flex';

    const airline = airlineName(f.airline_iata, f.airline_icao);
    const acModel = aircraftName(f.aircraft_code) || f.aircraft_code || '';
    const ageStr  = f.year ? (new Date().getFullYear() - parseInt(f.year)) + ' Jahre' : '–';
    const vs = f.vertical_speed_fpm || 0;
    let vsStr = 'Level';
    if (vs > 100)  vsStr = `▲ +${Math.round(vs).toLocaleString('de')} ft/min`;
    if (vs < -100) vsStr = `▼ ${Math.round(vs).toLocaleString('de')} ft/min`;

    document.getElementById('imBody').innerHTML = `
        <div class="info-modal-title">${f.registration || f.callsign || f.id}</div>
        <div class="info-modal-subtitle">${airline || '–'}${acModel ? ' · ' + acModel : ''}</div>

        <div class="info-modal-grid">
            <div>
                <div class="info-modal-field-label">Kennzeichen</div>
                <div class="info-modal-field-value" style="font-family:monospace">${f.registration || '–'}</div>
            </div>
            <div>
                <div class="info-modal-field-label">ICAO 24-bit</div>
                <div class="info-modal-field-value" style="font-family:monospace">${(f.icao24||'').toUpperCase() || '–'}</div>
            </div>
            <div>
                <div class="info-modal-field-label">MSN</div>
                <div class="info-modal-field-value" id="imMsn" style="font-family:monospace">${f.msn || '–'}</div>
            </div>
            <div>
                <div class="info-modal-field-label">Volltyp</div>
                <div class="info-modal-field-value" id="imType">${f.type_name_full || acModel || '–'}</div>
            </div>
            <div>
                <div class="info-modal-field-label">Baujahr</div>
                <div class="info-modal-field-value" id="imYear">${f.year || '–'}</div>
            </div>
            <div>
                <div class="info-modal-field-label">Alter</div>
                <div class="info-modal-field-value" id="imAge">${ageStr}</div>
            </div>
            <div>
                <div class="info-modal-field-label">Betreiber</div>
                <div class="info-modal-field-value" id="imOperator">${f.operator_full || airline || '–'}</div>
            </div>
            <div>
                <div class="info-modal-field-label">Land</div>
                <div class="info-modal-field-value" id="imCountry">–</div>
            </div>
        </div>

        <hr class="info-modal-divider">
        <div class="info-modal-section">Aktueller Flug</div>
        <div style="font-size:13px;color:#94a3b8;margin-bottom:12px">
            <strong style="color:#cbd5e1">${f.callsign || '–'}</strong>
            &nbsp;${apName(f.origin_airport_iata) || f.origin_airport_iata || '?'}
            &rarr; ${apName(f.destination_airport_iata) || f.destination_airport_iata || '?'}
        </div>
        <div class="info-modal-stats">
            <div class="info-modal-stat">
                <div class="info-modal-stat-val">${f.altitude_ft ? Math.round(f.altitude_ft).toLocaleString('de') : '–'}</div>
                <div class="info-modal-stat-lbl">ft Höhe</div>
            </div>
            <div class="info-modal-stat">
                <div class="info-modal-stat-val">${f.ground_speed_kmh || '–'}</div>
                <div class="info-modal-stat-lbl">km/h</div>
            </div>
            <div class="info-modal-stat">
                <div class="info-modal-stat-val">${f.distance_km}</div>
                <div class="info-modal-stat-lbl">km entfernt</div>
            </div>
            <div class="info-modal-stat">
                <div class="info-modal-stat-val">${Math.round(f.heading||0)}° ${headingLabel(f.heading)}</div>
                <div class="info-modal-stat-lbl">Kurs</div>
            </div>
            <div class="info-modal-stat" style="flex-basis:100%">
                <div class="info-modal-stat-val">${vsStr}</div>
                <div class="info-modal-stat-lbl">Steigrate</div>
            </div>
        </div>

        ${(f.registration || f.icao24) ? `
        <hr class="info-modal-divider">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${f.registration ? `<a href="https://www.flightradar24.com/data/aircraft/${f.registration.toLowerCase()}#" target="_blank" rel="noreferrer"
               style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#f46217;border-radius:9px;color:#fff;font-size:13px;font-weight:700;text-decoration:none">
                FR24 ↗
            </a>` : ''}
            ${f.icao24 ? `<a href="https://globe.adsbexchange.com/?icao=${f.icao24.toUpperCase()}&zoom=11" target="_blank"
               style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#0ea5e9;border-radius:9px;color:#fff;font-size:13px;font-weight:700;text-decoration:none">
                ADSB ↗
            </a>` : ''}
        </div>` : ''}
    `;

    if (f.icao24) {
        fetch('/api/aircraft/' + f.icao24)
            .then(r => r.json())
            .then(d => {
                if (d.photo_url) {
                    const img = document.getElementById('imPhoto');
                    img.onload = () => {
                        document.getElementById('imPhotoPlaceholder').style.display = 'none';
                        img.style.display = 'block';
                    };
                    img.onerror = () => {};
                    img.src = d.photo_url;
                }
                const upd = {imCountry: d.country, imYear: d.year, imMsn: d.serial_no, imType: d.type_name, imOperator: d.operator};
                for (const [id, val] of Object.entries(upd)) {
                    if (val) { const el = document.getElementById(id); if (el && el.textContent === '–') el.textContent = val; }
                }
                if (d.year && !f.year) {
                    const el = document.getElementById('imAge');
                    if (el) { const age = new Date().getFullYear() - parseInt(d.year); if (age >= 0 && age < 80) el.textContent = age + ' Jahre'; }
                }
            })
            .catch(() => {});
    }
}

function closeInfoModal() {
    document.getElementById('infoModal').classList.remove('open');
}
document.getElementById('infoModal').addEventListener('click', e => {
    if (e.target === document.getElementById('infoModal')) closeInfoModal();
});
</script>
