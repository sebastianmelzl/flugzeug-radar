<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flugzeug Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #090d1a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #0d1528;
            border-bottom: 1px solid #1e3a5f;
            padding: 13px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 10;
        }

        .logo { font-size: 18px; font-weight: 800; color: #00d4aa; }

        .controls { display: flex; align-items: center; gap: 16px; }
        .meta { font-size: 13px; color: #475569; }
        .meta b { color: #00d4aa; display: inline-block; min-width: 2ch; text-align: right; }

        select {
            background: #1e293b; border: 1px solid #334155;
            color: #e2e8f0; padding: 7px 12px;
            border-radius: 8px; font-size: 13px; cursor: pointer;
        }

        .pulse {
            width: 9px; height: 9px; border-radius: 50%;
            background: #00d4aa; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

        main { padding: 20px 28px; }

        .status-bar {
            display: flex; align-items: baseline;
            gap: 12px; margin-bottom: 18px;
        }
        .flight-count { font-size: 14px; color: #64748b; }
        .flight-count b { font-size: 28px; color: #00d4aa; font-weight: 800; }
        .source-tag {
            font-size: 11px; font-weight: 700;
            padding: 2px 8px; border-radius: 8px;
            color: #f97316; border: 1px solid #f9731650;
            background: #f9731610;
        }

        /* ── Card ── */
        .card {
            background: #0d1528;
            border: 1px solid #1e3a5f;
            border-radius: 14px;
            margin-bottom: 14px;
            display: flex;
            align-items: stretch;
            overflow: hidden;
            transition: border-color .2s;
            position: relative;
        }
        .card:hover { border-color: #00d4aa44; }
        .card.new-flight {
            border-color: #00d4aa;
            animation: flashIn .8s ease;
        }
        @keyframes flashIn { 0%{background:#00d4aa18} 100%{background:#0d1528} }

        .card.compact {
            opacity: .7;
            margin-bottom: 6px;
        }
        .card.compact:hover { opacity: 1; }
        .compact-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            width: 100%;
        }
        .compact-callsign {
            font-family: monospace;
            font-size: 13px;
            font-weight: 700;
            color: #94a3b8;
            min-width: 80px;
        }
        .compact-type {
            font-size: 11px;
            color: #64748b;
            flex: 1;
        }
        .compact-stats {
            display: flex;
            gap: 14px;
            font-size: 11px;
            color: #64748b;
        }
        .compact-stats span { white-space: nowrap; }

        .card.military {
            border-color: #4a7c3f;
            border-width: 2px;
            background: #0a1a0d;
        }
        .card.military:hover { border-color: #6db560; }
        .card.military.new-flight { border-color: #a3d99b; animation: flashInMil .8s ease; }
        @keyframes flashInMil { 0%{background:#4a7c3f22} 100%{background:#0a1a0d} }
        .military-badge {
            background: #2d5a27;
            color: #a3d99b;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .08em;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .card.military .side-bar { background: #4a7c3f; }

        .card.overhead {
            border-color: #f97316;
            border-width: 2px;
            background: #1a0e06;
            box-shadow: 0 0 32px #f9731630, 0 0 0 1px #f9731644;
            animation: overheadPulse 1.5s ease-in-out infinite;
        }
        @keyframes overheadPulse {
            0%,100% { box-shadow: 0 0 32px #f9731630, 0 0 0 1px #f9731444; }
            50%      { box-shadow: 0 0 52px #f9731660, 0 0 0 2px #f97316aa; }
        }

        .overhead-tag {
            position: absolute; top: 14px; right: 14px;
            background: #f97316; color: #fff;
            font-size: 11px; font-weight: 800;
            padding: 4px 10px; border-radius: 6px;
            letter-spacing: .04em;
            animation: overheadPulse 1.5s ease-in-out infinite;
            z-index: 2;
        }

        .new-tag {
            position: absolute; top: 14px; right: 14px;
            background: #ef4444; color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 5px;
            z-index: 2;
        }

        .speak-btn {
            background: #1e293b; border: 1px solid #334155;
            color: #64748b; font-size: 16px;
            width: 36px; height: 36px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all .15s;
            margin-top: 8px; width: 100%;
        }
        .speak-btn:hover { background: #00d4aa22; border-color: #00d4aa; color: #00d4aa; }
        .speak-btn.speaking { background: #00d4aa22; border-color: #00d4aa; color: #00d4aa;
            animation: pulse 1s infinite; }

        /* Card sections */
        .sec {
            padding: 20px 24px;
            border-right: 1px solid #1a2f4a;
        }
        .sec:last-child { border-right: none; }

        .sec-label {
            font-size: 9px; text-transform: uppercase;
            letter-spacing: .1em; color: #334155;
            margin-bottom: 12px; font-weight: 600;
        }

        /* Section 1: Identity */
        .sec-identity {
            width: 220px;
            flex-shrink: 0;
        }

        .callsign {
            font-size: 38px; font-weight: 800;
            color: #00d4aa; font-family: 'Courier New', monospace;
            letter-spacing: .03em; line-height: 1;
            margin-bottom: 4px;
        }

        .flight-num {
            font-size: 14px; color: #64748b;
            font-family: 'Courier New', monospace;
            margin-bottom: 14px;
        }

        .id-row {
            display: flex; flex-direction: column; gap: 6px;
        }

        .id-item-label {
            font-size: 9px; text-transform: uppercase;
            letter-spacing: .08em; color: #334155; margin-bottom: 1px;
        }

        .id-item-value {
            font-size: 14px; font-weight: 600; color: #94a3b8;
        }

        .id-item-value.loading {
            color: #334155; font-style: italic; font-size: 12px;
        }

        /* Section 2: Route */
        .sec-route {
            flex: 1;
            min-width: 0;
        }

        .route-wrap {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .airport {
            flex: 1; min-width: 0;
        }

        .airport.right { text-align: right; }

        .ap-iata {
            font-size: 48px; font-weight: 900;
            color: #e2e8f0; letter-spacing: .04em; line-height: 1;
        }

        .ap-name {
            font-size: 15px; font-weight: 600;
            color: #94a3b8; margin-top: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .ap-city {
            font-size: 12px; color: #475569; margin-top: 2px;
        }

        .ap-time {
            font-size: 18px; font-weight: 700;
            color: #00d4aa; margin-top: 8px;
            font-family: 'Courier New', monospace;
        }

        .ap-time-label {
            font-size: 10px; color: #334155; margin-top: 1px;
        }

        .route-mid {
            flex-shrink: 0;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .route-plane {
            font-size: 28px;
            color: #1e3a5f;
        }

        .status-pill {
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
            white-space: nowrap;
        }

        /* Section 3: Live stats */
        .sec-live {
            width: 260px;
            flex-shrink: 0;
        }

        .live-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 18px;
        }

        .live-label {
            font-size: 9px; text-transform: uppercase;
            letter-spacing: .08em; color: #334155; margin-bottom: 3px;
        }

        .live-value {
            font-size: 22px; font-weight: 700;
            color: #e2e8f0; line-height: 1;
        }

        .live-unit { font-size: 11px; color: #475569; font-weight: 400; }
        .live-sub  { font-size: 11px; color: #475569; margin-top: 2px; }

        .vs-up   { color: #22c55e; }
        .vs-down { color: #f87171; }
        .vs-level{ color: #475569; }

        /* Section 4: Radar */
        .sec-radar {
            width: 150px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: #090d1a;
        }

        .radar-svg-wrap {
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            overflow: hidden;
            background: #060911;
            width: 118px; height: 118px;
        }

        .approach-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700;
            padding: 5px 10px; border-radius: 7px;
            text-align: center; width: 100%;
            justify-content: center;
        }

        .ap-dot {
            width: 6px; height: 6px;
            border-radius: 50%; flex-shrink: 0;
        }

        /* Empty / loading states */
        .state-msg {
            text-align: center; padding: 80px 20px; color: #334155;
        }
        .state-msg .icon { font-size: 56px; margin-bottom: 14px; }
        .state-msg .text { font-size: 20px; font-weight: 600; }
        .state-msg .hint { font-size: 14px; margin-top: 8px; color: #1e3a5f; }

        /* Map */
        #mapWrap { height: 360px; border-bottom: 1px solid #1e3a5f; display: none; }
        #map { height: 100%; }
        .flight-marker { font-size: 18px; line-height: 1; filter: drop-shadow(0 0 3px #000c); cursor: pointer; }
        .leaflet-popup-content-wrapper { background: #0d1528; border: 1px solid #1e3a5f; color: #e2e8f0; border-radius: 10px; }
        .leaflet-popup-tip { background: #0d1528; }
        .map-btn { background:#1e293b; border:1px solid #334155; color:#94a3b8; padding:7px 14px; border-radius:8px; font-size:13px; cursor:pointer; transition:all .15s; }
        .map-btn:hover, .map-btn.active { border-color:#00d4aa; color:#00d4aa; }
        .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#00d4aa; margin-right:4px; animation: livePulse 1.2s ease-in-out infinite; }
        @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

        /* FR24 link */
        .fr24-btn { background:none; border:none; color:#475569; font-size:12px; cursor:pointer; padding:4px 6px; border-radius:6px; transition:all .15s; text-decoration:none; display:inline-flex; align-items:center; gap:3px; }
        .fr24-btn:hover { color:#00d4aa; background:#00d4aa11; }
    </style>
</head>
<body>

<header>
    <div class="logo">✈ Flugzeug Radar</div>
    <div class="controls">
        <a href="/stats" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:7px 14px;border-radius:8px;font-size:13px;text-decoration:none;transition:all .15s" onmouseover="this.style.borderColor='#00d4aa';this.style.color='#00d4aa'" onmouseout="this.style.borderColor='#334155';this.style.color='#94a3b8'">📊 Statistik</a>
        <button class="map-btn" id="mapToggle" onclick="toggleMap()">🗺 Karte</button>
        <span class="meta"><span class="live-dot"></span>LIVE</span>
        <select id="radiusSelect">
            <option value="10" selected>10 km</option>
            <option value="25">25 km</option>
            <option value="50">50 km</option>
            <option value="100">100 km</option>
            <option value="150">150 km</option>
        </select>
        <div class="pulse"></div>
    </div>
</header>

<div id="mapWrap"><div id="map"></div></div>

<main>
    <div class="status-bar">
        <div class="flight-count"><b id="countNum">–</b> Flugzeuge im Radius</div>
        <span class="source-tag" id="sourceTag" style="display:none"></span>
    </div>
    <div id="flightList">
        <div class="state-msg"><div class="icon">📡</div><div class="text">Daten werden geladen…</div></div>
    </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

let previousIds = new Set();
let dingedIds = new Set();
let _firstRender = true;
let announcedOverhead = new Set();
let currentFlights = [];
let _map = null, _markers = {};

function airlineName(iata, icao) {
    if (!iata && !icao) return '';
    const name = AIRLINES[iata] || AIRLINES[icao];
    if (name) return name;
    // Show raw code only if we have no name, so at least something is displayed
    const code = iata || icao || '';
    return code ? `${code} (unbekannt)` : '';
}

function aircraftName(code) {
    if (!code) return '';
    return AIRCRAFT[code] || code;
}

/* ── Airport names ── */
const AP = {
    // Deutschland

function apName(iata) { return iata ? (AP[iata] || iata) : ''; }

/* ── Sprachausgabe ── */
function buildSpeechText(f) {
    const al     = airlineName(f.airline_iata, f.airline_icao);
    const ac     = (aircraftName(f.aircraft_code) || f.aircraft_code || '').replace(/-/g, ' ');
    const origin = apName(f.origin_airport_iata);
    const dest   = apName(f.destination_airport_iata);

    let text = 'Überflug';
    if (al) text += ` von ${al}`;
    if (ac) text += `, ${ac}`;
    if (origin && dest) text += `. Von ${origin} nach ${dest}.`;
    else if (dest)      text += `. Nach ${dest}.`;
    else                text += '.';
    return text;
}

function showToast(msg, color) {
    let t = document.getElementById('speakToast');
    if (!t) {
        t = document.createElement('div');
        t.id = 'speakToast';
        t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:999;transition:opacity .5s';
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = color;
    t.style.color = '#fff';
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.opacity = '0', 3000);
}

async function speak(text) {
    try {
        const resp = await fetch('/api/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        if (resp.ok) {
            showToast('🔊 macOS Siri Stimme', '#00d4aa');
        } else {
            showToast('⚠ API Fehler ' + resp.status, '#ef4444');
        }
    } catch(e) {
        showToast('⚠ Fetch fehlgeschlagen: ' + e.message, '#ef4444');
    }
}

let _audioCtx = null;
async function getAudioCtx() {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === 'suspended') await _audioCtx.resume();
    return _audioCtx;
}
// Unlock AudioContext on first user interaction
document.addEventListener('click', () => getAudioCtx(), { once: true });

function playChime() {
    return new Promise(async resolve => {
        try {
            const ctx = await getAudioCtx();

            // Master gain + soft compressor so it doesn't clip
            const comp = ctx.createDynamicsCompressor();
            comp.connect(ctx.destination);
            const master = ctx.createGain();
            master.gain.value = 0.55;
            master.connect(comp);

            // Inharmonic partials of a real bell (ratio, relative volume, decay multiplier)
            const partials = [
                [1.000, 1.00, 2.8],
                [2.000, 0.30, 1.2],
                [2.756, 0.55, 1.0],  // characteristic bell partial
                [5.404, 0.18, 0.6],
                [8.933, 0.08, 0.4],
            ];

            function bell(freq, startTime) {
                partials.forEach(([ratio, vol, decay]) => {
                    const osc = ctx.createOscillator();
                    const g   = ctx.createGain();
                    osc.connect(g);
                    g.connect(master);
                    osc.type = 'sine';
                    osc.frequency.value = freq * ratio;
                    g.gain.setValueAtTime(0, startTime);
                    g.gain.linearRampToValueAtTime(vol, startTime + 0.008);
                    g.gain.exponentialRampToValueAtTime(0.0001, startTime + decay);
                    osc.start(startTime);
                    osc.stop(startTime + decay + 0.05);
                });
            }

            // 4-tone ascending chime: C5 → E5 → G5 → C6
            const notes = [523.25, 659.25, 783.99, 1046.50];
            let t = ctx.currentTime + 0.08;
            notes.forEach(freq => { bell(freq, t); t += 0.52; });

            setTimeout(resolve, 2900);
        } catch { resolve(); }
    });
}

async function playDing() {
    try {
        const ctx = await getAudioCtx();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = 880;
        const t = ctx.currentTime;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.35, t + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
        osc.start(t); osc.stop(t + 0.4);
    } catch {}
}

async function announce(f) {
    await playChime();
    speak(buildSpeechText(f));
}

async function speakFlight(id) {
    const f = currentFlights.find(f => f.id === id);
    if (!f) return;
    const btn = document.querySelector(`#card-${id} .speak-btn`);
    if (btn) { btn.classList.add('speaking'); setTimeout(() => btn.classList.remove('speaking'), 6000); }
    await playChime();
    speak(buildSpeechText(f));
}

/* ── Helpers ── */
function headingLabel(h) {
    if (h==null) return '';
    return ['N','NO','O','SO','S','SW','W','NW'][Math.round(h/45)%8];
}

function fmtTime(ts) {
    if (!ts) return null;
    return new Date(ts*1000).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}

function approachStatus(f) {
    if (f.heading==null) return null;
    const dLon=(userLon-f.longitude)*Math.PI/180;
    const φ1=f.latitude*Math.PI/180, φ2=userLat*Math.PI/180;
    const bearing=(Math.atan2(
        Math.sin(dLon)*Math.cos(φ2),
        Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(dLon)
    )*180/Math.PI+360)%360;
    const diff=Math.abs(((f.heading-bearing)+180)%360-180);
    if (diff<45)  return {label:'Auf dich zu', color:'#00d4aa', dot:'#00d4aa'};
    if (diff>135) return {label:'Von dir weg', color:'#475569', dot:'#334155'};
    return             {label:'Fliegt vorbei', color:'#f59e0b', dot:'#f59e0b'};
}

/* ── Radar SVG ── */
function radarSVG(f) {
    const radiusKm = parseFloat(document.getElementById('radiusSelect').value);
    const cx=59, cy=59, maxR=50;
    const dLon=(f.longitude-userLon)*Math.PI/180;
    const φ1=userLat*Math.PI/180, φ2=f.latitude*Math.PI/180;
    const yb=Math.sin(dLon)*Math.cos(φ2);
    const xb=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(dLon);
    const bearing=(Math.atan2(yb,xb)*180/Math.PI+360)%360;
    const br=bearing*Math.PI/180;
    const dist=Math.min(f.distance_km/radiusKm,.92);
    const px=cx+Math.sin(br)*dist*maxR;
    const py=cy-Math.cos(br)*dist*maxR;
    const h=f.heading||0;
    return `<svg width="118" height="118" viewBox="0 0 118 118" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${maxR}" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,3"/>
      <circle cx="${cx}" cy="${cy}" r="${maxR*.5}" fill="none" stroke="#111827" stroke-width="1"/>
      <line x1="${cx}" y1="${cy-maxR}" x2="${cx}" y2="${cy+maxR}" stroke="#111827" stroke-width=".6"/>
      <line x1="${cx-maxR}" y1="${cy}" x2="${cx+maxR}" y2="${cy}" stroke="#111827" stroke-width=".6"/>
      <text x="${cx}" y="${cy-maxR-3}" text-anchor="middle" fill="#243855" font-size="8" font-family="monospace">N</text>
      <text x="${cx}" y="${cy+maxR+10}" text-anchor="middle" fill="#243855" font-size="8" font-family="monospace">S</text>
      <text x="${cx+maxR+7}" y="${cy+3}" text-anchor="middle" fill="#243855" font-size="8" font-family="monospace">O</text>
      <text x="${cx-maxR-7}" y="${cy+3}" text-anchor="middle" fill="#243855" font-size="8" font-family="monospace">W</text>
      <line x1="${cx}" y1="${cy}" x2="${px}" y2="${py}" stroke="#00d4aa" stroke-width=".8" stroke-dasharray="3,3" opacity=".4"/>
      <circle cx="${cx}" cy="${cy}" r="4" fill="#00d4aa" opacity=".85"/>
      <circle cx="${cx}" cy="${cy}" r="2" fill="#060911"/>
      <g transform="translate(${px},${py}) rotate(${h})">
        <rect x="-1.8" y="-7.5" width="3.6" height="15" rx="1.8" fill="#00d4aa"/>
        <rect x="-7.5" y="-2" width="15" height="3.2" rx="1.5" fill="#00d4aa"/>
        <rect x="-3.5" y="5" width="7" height="2.2" rx="1" fill="#00d4aa"/>
      </g>
    </svg>`;
}

/* ── Compact card for flights without airline/route (e.g. gliders) ── */
function renderCompactCard(f) {
    const acModel = aircraftName(f.aircraft_code);
    const reg = f.registration || f.callsign || f.id;
    return `
    <div class="card compact" id="card-${f.id}">
        <div class="compact-inner">
            <div class="compact-callsign">${f.callsign || f.id}</div>
            <div class="compact-type">${acModel || f.aircraft_code || '–'}${reg && reg !== f.callsign ? ' · ' + reg : ''}</div>
            <div class="compact-stats">
                <span>${f.distance_km} km</span>
                <span>${f.altitude_ft ? Math.round(f.altitude_ft).toLocaleString('de') + ' ft' : '–'}</span>
                <span>${f.ground_speed_kmh ? f.ground_speed_kmh + ' km/h' : '–'}</span>
            </div>
        </div>
    </div>`;
}

    'C17','C130','C5M','C5','C17A','KC135','KC10','KC46A','KC46',
    'B52','B52H','B1','B1B','B2','B2A','F16','F15','F18','F22','F35',
    'A10','U2','E3','E3TF','P8','RC135','RC12','E8','E6','C21',
    'C12','C20','C32','C37','C40','G5','GLF5','FA18',
]);
function isMilitary(f) {
    return MILITARY_ICAO.has(f.airline_icao) || MILITARY_AC.has(f.aircraft_code);
}
function isCompact(f) {
    if (isMilitary(f)) return false;
    if (GLIDER_CODES.has(f.aircraft_code)) return true;
    return !f.airline_iata && !f.airline_icao;
}

/* ── Render card ── */
function renderCard(f, isNew) {
    if (isCompact(f) && f.distance_km > 1) return renderCompactCard(f);

    const status = approachStatus(f);

    // Identity
    const airline    = airlineName(f.airline_iata, f.airline_icao);
    const acModel    = aircraftName(f.aircraft_code);
    const reg        = f.registration || '';
    const flightNum  = f.flight_number || '';
    const icao24     = f.icao24 || '';
    const squawk     = f.squawk || '';

    // Route / airports
    const originIata     = f.origin_airport_iata      || '';
    const destIata       = f.destination_airport_iata  || '';
    const originFullName = apName(originIata);
    const destFullName   = apName(destIata);

    const flightStatus = '';

    // Vertical speed
    const vs = f.vertical_speed_fpm || 0;
    let vsClass='vs-level', vsIcon='→', vsText='Level';
    if (vs > 100)  { vsClass='vs-up';   vsIcon='▲'; vsText=`+${Math.round(vs).toLocaleString('de')} ft/min`; }
    if (vs < -100) { vsClass='vs-down'; vsIcon='▼'; vsText=`${Math.round(vs).toLocaleString('de')} ft/min`; }

    // Approach
    const approachHTML = status ? `
        <div class="approach-badge" style="background:${status.color}18;border:1px solid ${status.color}44;color:${status.color}">
            <span class="ap-dot" style="background:${status.dot}"></span>
            ${status.label}
        </div>` : '';

    // Status pill color

    const mil = isMilitary(f);
    const speakBtn = IS_LOCAL ? '<button class="speak-btn" onclick="speakFlight(\'' + f.id + '\')" title="Vorlesen">🔊</button>' : '';
    return `
    <div class="card ${isNew?'new-flight':''} ${f.distance_km<=3?'overhead':''} ${mil?'military':''}" id="card-${f.id}">
        ${f.distance_km<=3 ? '<span class="overhead-tag">⬆ DIREKT ÜBER DIR</span>' : (isNew?'<span class="new-tag">NEU</span>':'')}

        <!-- Section 1: Identity -->
        <div class="sec sec-identity">
            ${mil ? '<span class="military-badge">✦ MILITARY</span>' : (f.airline_iata ? `<div style="background:#fff;border-radius:8px;padding:4px 10px;display:inline-flex;align-items:center;margin-bottom:6px">
                <img src="https://pics.avs.io/120/32/${f.airline_iata}.png" alt="${airline}"
                     style="height:24px;max-width:100px;object-fit:contain;display:block"
                     onerror="this.parentElement.style.display='none'">
            </div>` : '')}
            <div class="callsign">${f.callsign || f.id}</div>
            <div class="flight-num">${flightNum || '&nbsp;'}</div>
            <div class="id-row">
                <div>
                    <div class="id-item-label">Airline</div>
                    <div class="id-item-value">${airline || '–'}</div>
                </div>
                <div>
                    <div class="id-item-label">Flugzeugtyp</div>
                    <div class="id-item-value">${acModel || '–'}</div>
                </div>
                <div>
                    <div class="id-item-label">Kennzeichen</div>
                    <div class="id-item-value">${reg || '–'}</div>
                </div>
                ${icao24 ? `<div>
                    <div class="id-item-label">ICAO 24-bit</div>
                    <div class="id-item-value" style="font-family:monospace;font-size:13px">${icao24.toUpperCase()}</div>
                </div>` : ''}
                ${squawk ? `<div>
                    <div class="id-item-label">Squawk</div>
                    <div class="id-item-value" style="font-family:monospace">${squawk}</div>
                </div>` : ''}
            </div>
        </div>

        <!-- Section 2: Route -->
        <div class="sec sec-route">
            <div class="sec-label">Route</div>
            <div class="route-wrap">
                <div class="airport">
                    <div class="ap-iata">${originIata || '?'}</div>
                    <div class="ap-name">${originFullName}</div>
                </div>
                <div class="route-mid">
                    <div class="route-plane">✈</div>
                </div>
                <div class="airport right">
                    <div class="ap-iata">${destIata || '?'}</div>
                    <div class="ap-name">${destFullName}</div>
                </div>
            </div>
        </div>

        <!-- Section 3: Live stats -->
        <div class="sec sec-live">
            <div class="sec-label">Echtzeit-Daten</div>
            <div class="live-grid">
                <div>
                    <div class="live-label">Höhe</div>
                    <div class="live-value">${f.altitude_ft ? Math.round(f.altitude_ft).toLocaleString('de') : '–'} <span class="live-unit">ft</span></div>
                    <div class="live-sub">${f.altitude_m ? Math.round(f.altitude_m).toLocaleString('de') + ' m' : ''}</div>
                </div>
                <div>
                    <div class="live-label">Geschwindigkeit</div>
                    <div class="live-value">${f.ground_speed_kmh || '–'} <span class="live-unit">km/h</span></div>
                    <div class="live-sub">${f.ground_speed_kt || '–'} kt</div>
                </div>
                <div>
                    <div class="live-label">Kurs</div>
                    <div class="live-value">${Math.round(f.heading||0)}° <span class="live-unit">${headingLabel(f.heading)}</span></div>
                </div>
                <div>
                    <div class="live-label">Entfernung</div>
                    <div class="live-value">${f.distance_km} <span class="live-unit">km</span></div>
                </div>
                <div style="grid-column:1/-1">
                    <div class="live-label">Steigrate</div>
                    <div class="live-value ${vsClass}" style="font-size:16px">${vsIcon} ${vsText}</div>
                </div>
            </div>
        </div>

        <!-- Section 4: Radar + approach -->
        <div class="sec-radar">
            <div class="radar-svg-wrap">${radarSVG(f)}</div>
            ${approachHTML}
            ${speakBtn}
            ${f.callsign ? `<a class="fr24-btn" href="https://www.flightradar24.com/${f.callsign.toLowerCase()}" target="_blank" title="Auf FlightRadar24 ansehen">FR24 ↗</a>` : ''}
        </div>
    </div>`;
}


/* ── Render flights from data ── */
function renderFlights(flights, source) {
    const newIds = new Set(flights.map(f => f.id));
    const oldIds = previousIds;
    previousIds = newIds;
    currentFlights = flights;

    if (IS_LOCAL) {
        // Ding for new flights that are approaching
        if (!_firstRender) {
            flights.forEach(f => {
                if (!oldIds.has(f.id) && !dingedIds.has(f.id)) {
                    const st = approachStatus(f);
                    if (st && st.label === 'Auf dich zu') {
                        dingedIds.add(f.id);
                        playDing();
                    }
                }
            });
        }
        _firstRender = false;
        for (const id of dingedIds) { if (!newIds.has(id)) dingedIds.delete(id); }

        // Full chime + announce when directly overhead
        flights.filter(f => f.distance_km <= (isCompact(f) ? 1 : 3)).forEach(f => {
            if (!announcedOverhead.has(f.id)) {
                announcedOverhead.add(f.id);
                announce(f);
            }
        });
    }
    for (const id of announcedOverhead) { if (!newIds.has(id)) announcedOverhead.delete(id); }

    document.getElementById('countNum').textContent = flights.length;
    const st = document.getElementById('sourceTag');
    if (source) { st.textContent = source==='fr24'?'FlightRadar24':'OpenSky'; st.style.display=''; }

    const list = document.getElementById('flightList');
    if (flights.length === 0) {
        list.innerHTML = `<div class="state-msg"><div class="icon">🔭</div>
            <div class="text">Keine Flugzeuge im Radius</div>
            <div class="hint">Versuche einen größeren Radius</div></div>`;
        return;
    }
    const main = flights.filter(f => !isCompact(f));
    const comp = flights.filter(f =>  isCompact(f));
    list.innerHTML = [...main, ...comp].map(f => renderCard(f, false)).join('');
}

/* ── Leaflet map ── */
function initMap() {
    if (_map) return;
    _map = L.map('map', { zoomControl: true }).setView([userLat, userLon], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO',
        maxZoom: 18
    }).addTo(_map);
    L.circleMarker([userLat, userLon], {
        radius: 7, color: '#00d4aa', fillColor: '#00d4aa', fillOpacity: 1, weight: 2
    }).addTo(_map).bindPopup('📍 Dein Standort');
}

function planeIcon(color, heading, small) {
    const rot = heading || 0;
    const sc  = small ? 0.7 : 1;
    const sz  = Math.round(48 * sc);
    const off = Math.round(sz / 2);
    // viewBox centered on (0,0) → rotate() rotates around visual center, no drift
    // Aircraft top-view: nose at top (0,-12). White dot = nose.
    const svg = '<svg width="' + sz + '" height="' + sz + '" viewBox="-15 -15 30 30" xmlns="http://www.w3.org/2000/svg">'
        + '<g transform="rotate(' + rot + ')">'
        + '<path d="M0,-12 L1.5,-3 L9,2 L6,5 L2,3 L2,10 L0,11 L-2,10 L-2,3 L-6,5 L-9,2 L-1.5,-3 Z" fill="' + color + '" opacity="0.92"/>'
        + '<circle cx="0" cy="-9" r="2.5" fill="white"/>'
        + '</g>'
        + '</svg>';
    return L.divIcon({ html: svg, iconSize: [sz, sz], iconAnchor: [off, off], className: '' });
}

function updateMap(allFlights) {
    if (!_map) return;
    const radius = parseFloat(document.getElementById('radiusSelect').value);
    const seen = new Set();

    allFlights.forEach(f => {
        seen.add(f.id);
        const inRadius = f.distance_km <= radius;
        const overhead = f.distance_km <= (isCompact(f) ? 1 : 3);
        const color = overhead ? '#f97316' : inRadius ? '#00d4aa' : '#475569';
        const popup = `<b>${f.callsign||f.id}</b><br>${f.airline_iata||f.airline_icao||'–'} · ${f.aircraft_code||'–'}<br>${f.origin_airport_iata||'?'} → ${f.destination_airport_iata||'?'}<br>${f.altitude_ft ? Math.round(f.altitude_ft).toLocaleString('de')+' ft' : '–'} · ${f.distance_km} km`;
        const icon = planeIcon(color, f.heading, isCompact(f));

        if (_markers[f.id]) {
            _markers[f.id].setLatLng([f.latitude, f.longitude]).setIcon(icon).setPopupContent(popup);
        } else {
            _markers[f.id] = L.marker([f.latitude, f.longitude], { icon })
                .addTo(_map).bindPopup(popup)
                .on('click', () => {
                    const card = document.getElementById(`card-${f.id}`);
                    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });
        }
    });

    Object.keys(_markers).forEach(id => {
        if (!seen.has(id)) { _map.removeLayer(_markers[id]); delete _markers[id]; }
    });
}

function toggleMap() {
    const wrap = document.getElementById('mapWrap');
    const btn  = document.getElementById('mapToggle');
    const show = wrap.style.display === 'none';
    wrap.style.display = show ? 'block' : 'none';
    btn.classList.toggle('active', show);
    if (show) { initMap(); if (_map) _map.invalidateSize(); updateMap(currentFlights); }
}

/* ── WebSocket ── */
function applyFlightData(allFlights, source) {
    const radius = parseFloat(document.getElementById('radiusSelect').value);
    const flights = allFlights
        .filter(f => {
            f.distance_km = parseFloat(f.distance_km) || (() => {
                const dlat = f.latitude - userLat, dlon = f.longitude - userLon;
                return parseFloat((Math.sqrt(dlat*dlat + dlon*dlon) * 111).toFixed(1));
            })();
            return f.distance_km <= radius;
        })
        .sort((a, b) => a.distance_km - b.distance_km);
    renderFlights(flights, source);
    updateMap(allFlights);
}

// Initial load via REST so data shows immediately on page open
fetch(`/api/flights?radius=150`)
    .then(r => r.json())
    .then(d => { if (d.flights?.length) applyFlightData(d.flights, d.source); })
    .catch(() => {});

const socket = io();

socket.on('flights_update', data => {
    applyFlightData(data.flights || [], data.source);
});

socket.on('connect', () => showToast('🔌 Verbunden', '#00d4aa'));
socket.on('disconnect', () => showToast('⚠ Verbindung getrennt', '#ef4444'));

document.getElementById('radiusSelect').addEventListener('change', () => {
    previousIds = new Set();
    renderFlights(currentFlights.filter(f =>
        f.distance_km <= parseFloat(document.getElementById('radiusSelect').value)
    ).sort((a,b) => a.distance_km - b.distance_km), null);
});

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => { userLat = pos.coords.latitude; userLon = pos.coords.longitude; },
        () => {}
    );
}
</script>
